# ═══════════════════════════════════════════════════════════════════════════
# Garamatic Integration Test Environment
# ═══════════════════════════════════════════════════════════════════════════
# 
# Orchestrates all services for integration testing.
# Run: docker compose -f docker-compose.test.yml up --build --abort-on-container-exit
#
# Services:
#   - ticket-masala: Core ticket management API (.NET)
#   - event-planner: Event planning service (PHP/Drupal)
#   - mailing-service: Email delivery service (.NET)
#   - integration-contracts-validator: Schema validation service
#   - test-runner: Executes the integration test suite
# ═══════════════════════════════════════════════════════════════════════════

services:
  # ════════════════════════════════════════════════════════════
  # RABBITMQ - Message Broker
  # ════════════════════════════════════════════════════════════
  rabbitmq:
    image: rabbitmq:3-management-alpine
    container_name: garamatic_rabbitmq_test
    ports:
      - "5672:5672"
      - "15672:15672"
    networks:
      - garamatic_test_net

  # ════════════════════════════════════════════════════════════
  # TICKET MASALA - Core Ticket Service
  # ════════════════════════════════════════════════════════════
  ticket-masala:
    build:
      context: ../../ticket-masala
      dockerfile: Dockerfile
    container_name: garamatic_ticket_masala_test
    ports:
      - "8085:8080"
    environment:
      - ASPNETCORE_ENVIRONMENT=Testing
      - ConnectionStrings__DefaultConnection=Data Source=/app/data/masala_test.db;Cache=Shared;Mode=ReadWriteCreate
      - MasalaConfig__ConfigPath=/app/config
      - TEST_MODE=true
      - RabbitMQ__HostName=rabbitmq
    volumes:
      - ../../ticket-masala/config:/app/config:ro
      - ticket_masala_data:/app/data
    networks:
      - garamatic_test_net
    depends_on:
      rabbitmq:
        condition: service_started

  # ════════════════════════════════════════════════════════════
  # GATEKEEPER API - Ingestion Service
  # ════════════════════════════════════════════════════════════
  gatekeeper-api:
    build:
      context: ../../ticket-masala
      dockerfile: src/GatekeeperApi/Dockerfile
    container_name: garamatic_gatekeeper_test
    ports:
      - "8086:8080"
    environment:
      - ASPNETCORE_ENVIRONMENT=Testing
      - TICKET_MASALA_API_URL=http://ticket-masala:8080
      - RabbitMQ__HostName=rabbitmq
    networks:
      - garamatic_test_net
    depends_on:
      ticket-masala:
        condition: service_started
      rabbitmq:
        condition: service_started

  # ════════════════════════════════════════════════════════════
  # MAILING SERVICE - Email Worker + API
  # ════════════════════════════════════════════════════════════
  mailing-service:
    build:
      context: ../../mailing-service
      dockerfile: Dockerfile
    container_name: garamatic_mailing_test
    ports:
      - "8087:8080"
    environment:
      - ASPNETCORE_ENVIRONMENT=Testing
      - RabbitMQ__Host=rabbitmq
      - RabbitMQ__Port=5672
      - RabbitMQ__Username=guest
      - RabbitMQ__Password=guest
      - SendGrid__ApiKey=${SENDGRID_API_KEY:-SG.test-key}
      - SendGrid__FromEmail=${SENDGRID_FROM_EMAIL:-test@garamatic.io}
      - SendGrid__FromName=${SENDGRID_FROM_NAME:-Garamatic Test}
    networks:
      - garamatic_test_net
    depends_on:
      - rabbitmq
      - mailhog

  # ════════════════════════════════════════════════════════════
  # EVENT PLANNER - Event Management (PHP/Drupal)
  # ════════════════════════════════════════════════════════════
  event-planner:
    build:
      context: ../../event-planner
      dockerfile: Dockerfile
    container_name: garamatic_event_planner_test
    ports:
      - "8088:80"
    environment:
      - DRUPAL_ENV=testing
      - TICKET_MASALA_API=http://ticket-masala:8080
    networks:
      - garamatic_test_net
    depends_on:
      - event-planner-db

  event-planner-db:
    image: mariadb:10.11
    container_name: garamatic_event_planner_test_db
    environment:
      - MYSQL_ROOT_PASSWORD=rootpass
      - MYSQL_DATABASE=drupal
      - MYSQL_USER=drupal
      - MYSQL_PASSWORD=drupal
    volumes:
      - event_planner_test_db_data:/var/lib/mysql
    networks:
      - garamatic_test_net
    healthcheck:
      test: ["CMD-SHELL", "mariadb-admin ping -u drupal -pdrupal || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ════════════════════════════════════════════════════════════
  # CONTRACT VALIDATOR - Schema Validation Service (Placeholder)
  # ════════════════════════════════════════════════════════════
  # NOTE: This service requires a Dockerfile.test to be created in integration-contracts/
  # Contract validation is done by the test-runner directly
  # contract-validator:
  #   build:
  #     context: ../../integration-contracts
  #     dockerfile: Dockerfile.test
  #   container_name: garamatic_contract_validator
  #   volumes:
  #     - ../../integration-contracts:/contracts:ro
  #   networks:
  #     - garamatic_test_net

  # ════════════════════════════════════════════════════════════
  # TEST RECEIVER - Webhook/Event Capture
  # ════════════════════════════════════════════════════════════
  test-receiver:
    image: nginx:alpine
    container_name: garamatic_test_receiver
    volumes:
      - ./nginx-test-receiver.conf:/etc/nginx/conf.d/default.conf:ro
      - ./test-logs:/var/log/nginx
    networks:
      - garamatic_test_net

  # ════════════════════════════════════════════════════════════
  # MAILHOG - Email Capture for Testing
  # ════════════════════════════════════════════════════════════
  mailhog:
    image: mailhog/mailhog:latest
    container_name: garamatic_mailhog
    ports:
      - "1025:1025"  # SMTP
      - "8025:8025"  # Web UI
    networks:
      - garamatic_test_net

  # ════════════════════════════════════════════════════════════
  # INTEGRATION TEST RUNNER
  # ════════════════════════════════════════════════════════════
  test-runner:
    build:
      context: ..
      dockerfile: docker/test-runner.Dockerfile
    container_name: garamatic_integration_runner
    volumes:
      - ..:/integration-tests:ro
      - ./test-results:/test-results
      - ./test-logs:/test-logs
      - ../../integration-contracts:/integration-contracts:ro
    environment:
      - TICKET_MASALA_URL=http://ticket-masala:8080
      - GATEKEEPER_URL=http://gatekeeper-api:8080
      - MAILING_SERVICE_URL=http://mailing-service:8080
      - EVENT_PLANNER_URL=http://event-planner:80
      - MAILHOG_URL=http://mailhog:8025
      - TEST_RECEIVER_URL=http://test-receiver:8080
    networks:
      - garamatic_test_net
    depends_on:
      ticket-masala:
        condition: service_started
      gatekeeper-api:
        condition: service_started
      mailing-service:
        condition: service_started
      event-planner:
        condition: service_started

networks:
  garamatic_test_net:
    driver: bridge

volumes:
  ticket_masala_data:
  event_planner_test_db_data:
