# Garamatic Integration Test Environment
# Run: docker compose -f docker-compose.test.yml up --build --abort-on-container-exit

services:
  rabbitmq:
    image: rabbitmq:3-management-alpine
    container_name: garamatic_rabbitmq_test
    ports:
      - "5672:5672"
      - "15672:15672"
    networks:
      - garamatic_test_net
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "-q", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5

  ticket-masala:
    build:
      context: ../../ticket-masala
      dockerfile: Dockerfile
    container_name: garamatic_ticket_masala_test
    ports:
      - "8085:8080"
    environment:
      - ASPNETCORE_ENVIRONMENT=Testing
      - ConnectionStrings__DefaultConnection=Data Source=/app/data/masala_test.db;Cache=Shared;Mode=ReadWriteCreate
      - MasalaConfig__ConfigPath=/app/config
      - TEST_MODE=true
      - TICKETMASALA_ALLOW_SEED_BYPASS=true
      - RabbitMQ__HostName=rabbitmq
      - Agentic__ApiKey=masala-test-key
    volumes:
      - ../../ticket-masala/config:/app/config:ro
      - ticket_masala_data:/app/data
    networks:
      - garamatic_test_net
    depends_on:
      rabbitmq:
        condition: service_healthy

  gatekeeper-api:
    build:
      context: ../../ticket-masala
      dockerfile: src/GatekeeperApi/Dockerfile
    container_name: garamatic_gatekeeper_test
    ports:
      - "8086:8080"
    environment:
      - ASPNETCORE_ENVIRONMENT=Testing
      - TICKET_MASALA_API_URL=http://ticket-masala:8080
      - RabbitMQ__HostName=rabbitmq
    networks:
      - garamatic_test_net
    depends_on:
      ticket-masala:
        condition: service_started
      rabbitmq:
        condition: service_healthy

  mailing-service:
    build:
      context: ../../mailing-service
      dockerfile: Dockerfile
    container_name: garamatic_mailing_test
    ports:
      - "8087:8080"
    environment:
      - ASPNETCORE_ENVIRONMENT=Testing
      - RabbitMQ__Host=rabbitmq
      - RabbitMQ__Port=5672
      - RabbitMQ__Username=guest
      - RabbitMQ__Password=guest
      - SendGrid__ApiKey=${SENDGRID_API_KEY:-SG.test-key}
      - SendGrid__FromEmail=${SENDGRID_FROM_EMAIL:-test@garamatic.io}
      - SendGrid__FromName=${SENDGRID_FROM_NAME:-Garamatic Test}
    networks:
      - garamatic_test_net
    depends_on:
      rabbitmq:
        condition: service_healthy
      mailhog:
        condition: service_started


  agentic-service:
    build:
      context: ../../agentic-service
      dockerfile: Dockerfile
    container_name: garamatic_agentic_test
    ports:
      - "3001:3001"
    environment:
      - CORS_ORIGINS=*
      - ticket_api_url=http://ticket-masala:8080
      - rabbitmq_host=rabbitmq
      - ticket_api_key=masala-test-key
    networks:
      - garamatic_test_net
    command: ["python", "-m", "agentic_service.api"]
    depends_on:
      ticket-masala:
        condition: service_started
      rabbitmq:
        condition: service_healthy

  odoo:
    image: odoo:17
    container_name: garamatic_odoo_test
    ports:
      - "8069:8069"
    environment:
      - HOST=odoo-db
      - USER=odoo
      - PASSWORD=myodoo
    networks:
      - garamatic_test_net
    depends_on:
      odoo-db:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:8069/"]
      interval: 15s
      timeout: 15s
      retries: 30
      start_period: 120s

  odoo-db:
    image: postgres:15
    container_name: garamatic_odoo_db_test
    environment:
      - POSTGRES_DB=postgres
      - POSTGRES_USER=odoo
      - POSTGRES_PASSWORD=myodoo
      - POSTGRES_INITDB_ARGS=--encoding=UTF-8
    networks:
      - garamatic_test_net
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U odoo -d postgres"]
      interval: 5s
      timeout: 5s
      retries: 10

  odoo-integration:
    build:
      context: ../../odoo-integration
      dockerfile: Dockerfile
    container_name: garamatic_odoo_integration_test
    ports:
      - "8089:8080"
    environment:
      - ASPNETCORE_ENVIRONMENT=Testing
      - RabbitMQ__HostName=rabbitmq
      - RabbitMQ__Port=5672
      - RabbitMQ__UserName=guest
      - RabbitMQ__Password=guest
      - HealthChecks__Port=8080
      - Odoo__BaseUrl=http://odoo:8069
      - Odoo__Database=odoo
      - Odoo__Username=admin
      - Odoo__Password=admin
    networks:
      - garamatic_test_net
    depends_on:
      rabbitmq:
        condition: service_healthy
      odoo:
        condition: service_healthy

  # contract-validator:  # placeholder — validation done by test-runner
  #   build:
  #     context: ../../integration-contracts
  #     dockerfile: Dockerfile.test
  #   container_name: garamatic_contract_validator
  #   volumes:
  #     - ../../integration-contracts:/contracts:ro
  #   networks:
  #     - garamatic_test_net

  test-receiver:
    image: nginx:alpine
    container_name: garamatic_test_receiver
    volumes:
      - ./nginx-test-receiver.conf:/etc/nginx/conf.d/default.conf:ro
      - ./test-logs:/var/log/nginx
    networks:
      - garamatic_test_net

  mailhog:
    image: mailhog/mailhog:latest
    container_name: garamatic_mailhog
    ports:
      - "1025:1025"  # SMTP
      - "8025:8025"  # Web UI
    networks:
      - garamatic_test_net

  showcase:
    image: nginx:1.27-alpine
    container_name: garamatic_showcase_test
    ports:
      - "8092:80"
    volumes:
      - ../../demo/showcase:/usr/share/nginx/html:ro
    networks:
      - garamatic_test_net
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:80/"]
      interval: 5s
      timeout: 3s
      retries: 10

  test-runner:
    build:
      context: ..
      dockerfile: docker/test-runner.Dockerfile
    container_name: garamatic_integration_runner
    volumes:
      - ..:/integration-tests:ro
      - ./test-results:/test-results
      - ./test-logs:/test-logs
      - ../../integration-contracts:/integration-contracts:rw
    environment:
      - TICKET_MASALA_URL=http://ticket-masala:8080
      - GATEKEEPER_URL=http://gatekeeper-api:8080
      - MAILING_SERVICE_URL=http://mailing-service:8080
      - AGENTIC_SERVICE_URL=http://agentic-service:3001
      - ODOO_INTEGRATION_URL=http://odoo-integration:8080
      - RABBITMQ_URL=http://rabbitmq:15672
      - MAILHOG_URL=http://mailhog:8025
      - TEST_RECEIVER_URL=http://test-receiver:8080
      - SHOWCASE_URL=http://showcase:80
      - TEST_RESULTS_DIR=/test-results
    networks:
      - garamatic_test_net
    depends_on:
      ticket-masala:
        condition: service_started
      gatekeeper-api:
        condition: service_started
      mailing-service:
        condition: service_started
      agentic-service:
        condition: service_started
      odoo-integration:
        condition: service_started
      odoo:
        condition: service_healthy
      showcase:
        condition: service_started

networks:
  garamatic_test_net:
    driver: bridge

volumes:
  ticket_masala_data:
