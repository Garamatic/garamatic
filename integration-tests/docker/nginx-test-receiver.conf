server {
    listen 8080;
    server_name localhost;

    location /webhook {
        access_log /var/log/nginx/webhook.log;
        add_header Content-Type application/json;
        return 200 '{"received": true}';
    }

    location /events {
        access_log /var/log/nginx/events.log;
        add_header Content-Type application/json;
        return 200 '{"status": "ok"}';
    }

    location /health {
        access_log off;
        return 200 'healthy';
    }
}
