<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" role="img" aria-labelledby="desgoffe-title">
  <title id="desgoffe-title">Ville de Desgoffe Logo (Stamp)</title>

  <defs>
    <!-- Original shield shape -->
    <path id="shield" d="M256 116C226 135 195 143 158 149V232C158 292 196 342 256 379C316 342 354 292 354 232V149C317 143 286 135 256 116Z" />
    <clipPath id="shield-clip">
      <use href="#shield" />
    </clipPath>
    
    <mask id="castle-cutouts">
      <!-- White makes the area visible -->
      <rect x="0" y="0" width="512" height="512" fill="white" />
      
      <!-- Black makes the area transparent (cutouts) -->
      <!-- Door -->
      <path d="M246 245 V 210 C 246 200, 266 200, 266 210 V 245 Z" fill="black" />
      <!-- Windows -->
      <rect x="226" y="185" width="12" height="16" rx="6" fill="black" />
      <rect x="274" y="185" width="12" height="16" rx="6" fill="black" />
      <circle cx="256" cy="155" r="6" fill="black" />
    </mask>
  </defs>

  <!-- Color acts as default, but it inherits currentColor from CSS -->
  <g fill="currentColor" color="#2D5A3D" transform="translate(256 256) scale(1.6) translate(-256 -256)">
    
    <!-- Outer Shield Border -->
    <use href="#shield" fill="none" stroke="currentColor" stroke-width="20" stroke-linejoin="round" />

    <g clip-path="url(#shield-clip)">
      
      <!-- Wavy Rivers -->
      <!-- Using thick, clean strokes to emulate carved/inked lines -->
      <path d="M0 275 C 100 245, 160 295, 256 285 C 352 275, 412 245, 512 275" fill="none" stroke="currentColor" stroke-width="24" stroke-linecap="round" />
      <path d="M0 325 C 100 295, 160 345, 256 335 C 352 325, 412 295, 512 325" fill="none" stroke="currentColor" stroke-width="16" stroke-linecap="round" />
      <path d="M0 365 C 100 335, 160 385, 256 375 C 352 365, 412 335, 512 365" fill="none" stroke="currentColor" stroke-width="10" stroke-linecap="round" />

      <!-- Minimalist Castle + Trees (Solid with masked cutouts) -->
      <g mask="url(#castle-cutouts)">
        <!-- Main block -->
        <rect x="215" y="175" width="82" height="60" />
        <!-- Top block (below roof) -->
        <rect x="233" y="145" width="46" height="30" />
        <!-- Pointy Roof -->
        <path d="M225 145 L 256 115 L 287 145 Z" />
        <!-- Base Step -->
        <rect x="215" y="235" width="82" height="10" />

        <!-- Two Minimalist Pines -->
        <path d="M185 245 L 205 175 L 225 245 Z" />
        <path d="M287 245 L 307 175 L 327 245 Z" />
      </g>
      
    </g>
  </g>
</svg>
