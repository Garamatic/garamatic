# ═══════════════════════════════════════════════════════════════════════════
# Garamatic Microservices Integration Stack
# ═══════════════════════════════════════════════════════════════════════════
# Spins up the entire Garamatic ecosystem for local integration testing.
#
# Usage:
#   docker compose up --build
#   docker compose up -d   # detached mode
#   docker compose down    # tear down
#
# Services:
#   - RabbitMQ      : Shared message broker (ports 5672, 15672)
#   - Ticket Masala : Core ticket API (.NET)           (port 8085)
#   - Gatekeeper    : Ingestion API (.NET)             (port 8086)
#   - Mailing       : Email worker + API (.NET)        (port 8087)
#   - Event Planner : Drupal CMS (PHP)                 (port 8088)
#   - Garamatic Web : Static frontend (Nginx)          (port 8090)
#   - Masala Web    : Marketing site (Nginx)           (port 8091)
#   - Agentic       : MCP server (Python)              (port 3001)
#   - Mailhog       : Test email capture               (ports 1025, 8025)
# ═══════════════════════════════════════════════════════════════════════════

version: '3.8'

services:
  # ════════════════════════════════════════════════════════════
  # RABBITMQ - Message Broker
  # ════════════════════════════════════════════════════════════
  rabbitmq:
    image: rabbitmq:3-management-alpine
    container_name: garamatic_rabbitmq
    ports:
      - "5672:5672"
      - "15672:15672"
    environment:
      RABBITMQ_DEFAULT_USER: guest
      RABBITMQ_DEFAULT_PASS: guest
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "status"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - garamatic-network

  # ════════════════════════════════════════════════════════════
  # TICKET MASALA - Core Ticket Service
  # ════════════════════════════════════════════════════════════
  ticket-masala:
    build:
      context: ./ticket-masala
      dockerfile: Dockerfile
    container_name: garamatic_ticket_masala
    ports:
      - "8085:8080"
    environment:
      - ASPNETCORE_ENVIRONMENT=Testing
      - ConnectionStrings__DefaultConnection=Data Source=/app/data/masala_test.db;Cache=Shared;Mode=ReadWriteCreate
      - MasalaConfig__ConfigPath=/app/config
      - MASALA_TENANT=desgoffe
      - MASALA_DB_PATH=/app/data/masala_test.db
      - RabbitMQ__HostName=rabbitmq
      - RabbitMQ__Port=5672
      - RabbitMQ__Username=guest
      - RabbitMQ__Password=guest
    volumes:
      - ./ticket-masala/config:/app/config:ro
      - ticket_masala_data:/app/data
    networks:
      - garamatic-network
    depends_on:
      rabbitmq:
        condition: service_healthy

  # ════════════════════════════════════════════════════════════
  # GATEKEEPER API - Ingestion Service
  # ════════════════════════════════════════════════════════════
  gatekeeper-api:
    build:
      context: ./ticket-masala
      dockerfile: src/GatekeeperApi/Dockerfile
    container_name: garamatic_gatekeeper
    ports:
      - "8086:8080"
    environment:
      - ASPNETCORE_ENVIRONMENT=Testing
      - TICKET_MASALA_API_URL=http://ticket-masala:8080
      - RabbitMQ__HostName=rabbitmq
      - RabbitMQ__Port=5672
      - RabbitMQ__Username=guest
      - RabbitMQ__Password=guest
    networks:
      - garamatic-network
    depends_on:
      ticket-masala:
        condition: service_started
      rabbitmq:
        condition: service_healthy

  # ════════════════════════════════════════════════════════════
  # MAILING SERVICE - Email Worker + API
  # ════════════════════════════════════════════════════════════
  mailing-service:
    build:
      context: ./mailing-service
      dockerfile: Dockerfile
    container_name: garamatic_mailing
    ports:
      - "8087:8080"
    environment:
      - ASPNETCORE_ENVIRONMENT=Testing
      - RabbitMQ__Host=rabbitmq
      - RabbitMQ__Port=5672
      - RabbitMQ__Username=guest
      - RabbitMQ__Password=guest
      - SendGrid__ApiKey=${SENDGRID_API_KEY:-SG.test-key}
      - SendGrid__FromEmail=${SENDGRID_FROM_EMAIL:-test@garamatic.io}
      - SendGrid__FromName=${SENDGRID_FROM_NAME:-Garamatic Test}
    networks:
      - garamatic-network
    depends_on:
      rabbitmq:
        condition: service_healthy

  # ════════════════════════════════════════════════════════════
  # EVENT PLANNER - Event Management
  # ════════════════════════════════════════════════════════════
  event-planner:
    build:
      context: ./event-planner
      dockerfile: Dockerfile
    container_name: garamatic_event_planner
    ports:
      - "8088:80"
    environment:
      - DRUPAL_ENV=testing
      - TICKET_MASALA_API=http://ticket-masala:8080
    networks:
      - garamatic-network
    depends_on:
      - event-planner-db

  event-planner-db:
    image: mariadb:10.11
    container_name: garamatic_event_planner_db
    environment:
      - MYSQL_ROOT_PASSWORD=rootpass
      - MYSQL_DATABASE=drupal
      - MYSQL_USER=drupal
      - MYSQL_PASSWORD=drupal
    volumes:
      - event_planner_db_data:/var/lib/mysql
    networks:
      - garamatic-network
    healthcheck:
      test: ["CMD-SHELL", "mariadb-admin ping -u drupal -pdrupal || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ════════════════════════════════════════════════════════════
  # GARAMATIC WEB - Main Frontend
  # ════════════════════════════════════════════════════════════
  garamatic-web:
    build:
      context: ./garamatic-web
      dockerfile: Dockerfile
    container_name: garamatic_web
    ports:
      - "8090:8080"
    networks:
      - garamatic-network

  # ════════════════════════════════════════════════════════════
  # MASALA WEB - Marketing Site
  # ════════════════════════════════════════════════════════════
  masala-web:
    build:
      context: ./masala-web
      dockerfile: Dockerfile
    container_name: garamatic_masala_web
    ports:
      - "8091:8080"
    networks:
      - garamatic-network

  # ════════════════════════════════════════════════════════════
  # AGENTIC SERVICE - MCP Server
  # ════════════════════════════════════════════════════════════
  agentic-service:
    build:
      context: ./agentic-service
      dockerfile: Dockerfile
    container_name: garamatic_agentic
    ports:
      - "3001:3001"
    environment:
      - TICKET_API_URL=http://ticket-masala:8080
      - RABBITMQ_HOST=rabbitmq
      - RABBITMQ_PORT=5672
      - RABBITMQ_USER=guest
      - RABBITMQ_PASS=guest
      - RABBITMQ_VHOST=/
      - LOG_LEVEL=INFO
    networks:
      - garamatic-network
    depends_on:
      - ticket-masala
      - rabbitmq

  # ════════════════════════════════════════════════════════════
  # MAILHOG - Test Email Capture
  # ════════════════════════════════════════════════════════════
  mailhog:
    image: mailhog/mailhog:latest
    container_name: garamatic_mailhog
    ports:
      - "1025:1025"  # SMTP
      - "8025:8025"  # Web UI
    networks:
      - garamatic-network

networks:
  garamatic-network:
    driver: bridge

volumes:
  ticket_masala_data:
  event_planner_db_data:
