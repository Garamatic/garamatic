# ═══════════════════════════════════════════════════════════════════════════
# Cloudflare Tunnel — Locally Managed Tunnel for Garamatic Stack
# ═══════════════════════════════════════════════════════════════════════════
# This runs a named Cloudflare Tunnel with locally managed ingress rules.
# The config.yml and credentials.json are generated by scripts/setup-tunnel.sh.
#
# Prerequisites:
#   1. cloudflared tunnel login
#   2. cloudflared tunnel create garamatic
#   3. echo 'CLOUDFLARE_TUNNEL_ID=<id>' >> .env
#   4. echo 'CLOUDFLARE_DOMAIN=your-domain.com' >> .env
#   5. make tunnel-setup   # Generates config.yml + copies credentials.json
#   6. make tunnel-up
#
# Routes are configured in cloudflared/config.yml (local file).
# Dashboard modifications are not possible for this tunnel.
# ═══════════════════════════════════════════════════════════════════════════

services:
  cloudflared:
    image: cloudflare/cloudflared:latest
    container_name: garamatic_cloudflared
    restart: unless-stopped
    command: tunnel --no-autoupdate --config /etc/cloudflared/config.yml run
    volumes:
      - ./cloudflared/config.yml:/etc/cloudflared/config.yml:ro
      - ./cloudflared/credentials.json:/etc/cloudflared/credentials.json:ro
    networks:
      - garamatic_demo_net
    healthcheck:
      test: ["CMD", "cloudflared", "version"]
      interval: 30s
      timeout: 5s
      retries: 3

networks:
  garamatic_demo_net:
    external: true
    name: ${DEMO_NETWORK:-garamatic_garamatic_demo_net}
