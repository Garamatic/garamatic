# ═══════════════════════════════════════════════════════════════════════════
# Garamatic Monitoring Stack
# ═══════════════════════════════════════════════════════════════════════════
# Prometheus + Grafana + Loki + Promtail for metrics, logs, and alerting.
# Usage: docker compose -f docker-compose.monitoring.yml up -d
# ═══════════════════════════════════════════════════════════════════════════

version: '3.8'

services:
  # ════════════════════════════════════════════════════════════
  # PROMETHEUS — Metrics Collection
  # ════════════════════════════════════════════════════════════
  prometheus:
    image: prom/prometheus:v3.0.0
    container_name: garamatic_prometheus
    ports:
      - "9090:9090"
    volumes:
      - ./monitoring/prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - ./monitoring/prometheus/rules:/etc/prometheus/rules:ro
      - prometheus_data:/prometheus
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
      - '--storage.tsdb.path=/prometheus'
      - '--storage.tsdb.retention.time=15d'
      - '--web.enable-lifecycle'
      - '--web.enable-admin-api'
    networks:
      - garamatic-network
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:9090/-/healthy"]
      interval: 30s
      timeout: 10s
      retries: 3

  # ════════════════════════════════════════════════════════════
  # GRAFANA — Visualization Dashboard
  # ════════════════════════════════════════════════════════════
  grafana:
    image: grafana/grafana:11.0.0
    container_name: garamatic_grafana
    ports:
      - "3000:3000"
    environment:
      - GF_SECURITY_ADMIN_PASSWORD=${GRAFANA_ADMIN_PASSWORD:-admin}
      - GF_USERS_ALLOW_SIGN_UP=false
      - GF_SERVER_ROOT_URL=http://localhost:3000
      - GF_AUTH_ANONYMOUS_ENABLED=true
      - GF_AUTH_ANONYMOUS_ORG_NAME=Garamatic
    volumes:
      - ./monitoring/grafana/dashboards:/etc/grafana/provisioning/dashboards:ro
      - ./monitoring/grafana/datasources:/etc/grafana/provisioning/datasources:ro
      - grafana_data:/var/lib/grafana
    networks:
      - garamatic-network
    depends_on:
      - prometheus
      - loki
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:3000/api/health"]
      interval: 30s
      timeout: 10s
      retries: 3

  # ════════════════════════════════════════════════════════════
  # LOKI — Log Aggregation
  # ════════════════════════════════════════════════════════════
  loki:
    image: grafana/loki:3.0.0
    container_name: garamatic_loki
    ports:
      - "3100:3100"
    volumes:
      - ./monitoring/loki/loki-config.yml:/etc/loki/local-config.yaml:ro
      - loki_data:/loki
    command: -config.file=/etc/loki/local-config.yaml
    networks:
      - garamatic-network
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:3100/ready"]
      interval: 30s
      timeout: 10s
      retries: 3

  # ════════════════════════════════════════════════════════════
  # PROMTAIL — Log Shipper
  # ════════════════════════════════════════════════════════════
  promtail:
    image: grafana/promtail:3.0.0
    container_name: garamatic_promtail
    volumes:
      - /var/lib/docker/containers:/var/lib/docker/containers:ro
      - /var/run/docker.sock:/var/run/docker.sock:ro
      - ./monitoring/promtail/promtail-config.yml:/etc/promtail/config.yml:ro
    command: -config.file=/etc/promtail/config.yml
    networks:
      - garamatic-network
    depends_on:
      - loki

  # ════════════════════════════════════════════════════════════
  # ALERTMANAGER — Alert Routing
  # ════════════════════════════════════════════════════════════
  alertmanager:
    image: prom/alertmanager:v0.27.0
    container_name: garamatic_alertmanager
    ports:
      - "9093:9093"
    volumes:
      - ./monitoring/alertmanager/alertmanager.yml:/etc/alertmanager/alertmanager.yml:ro
    networks:
      - garamatic-network
    depends_on:
      - prometheus

  # ════════════════════════════════════════════════════════════
  # NODE_EXPORTER — Host Metrics
  # ════════════════════════════════════════════════════════════
  node-exporter:
    image: prom/node-exporter:v1.8.0
    container_name: garamatic_node_exporter
    volumes:
      - /proc:/host/proc:ro
      - /sys:/host/sys:ro
      - /:/rootfs:ro
    command:
      - '--path.procfs=/host/proc'
      - '--path.rootfs=/rootfs'
      - '--path.sysfs=/host/sys'
      - '--collector.filesystem.mount-points-exclude=^/(sys|proc|dev|host|etc)($$|/)'
    networks:
      - garamatic-network

  # ════════════════════════════════════════════════════════════
  # CADVISOR — Container Metrics
  # ════════════════════════════════════════════════════════════
  cadvisor:
    image: gcr.io/cadvisor/cadvisor:v0.50.0
    container_name: garamatic_cadvisor
    ports:
      - "8080:8080"
    volumes:
      - /:/rootfs:ro
      - /var/run:/var/run:ro
      - /var/lib/docker:/var/lib/docker:ro
      - /var/run/docker.sock:/var/run/docker.sock:ro
      - /sys:/sys:ro
    networks:
      - garamatic-network
    privileged: true

networks:
  garamatic-network:
    driver: bridge

volumes:
  prometheus_data:
  grafana_data:
  loki_data:
