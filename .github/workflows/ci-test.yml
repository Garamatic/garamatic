# ═══════════════════════════════════════════════════════════════════════════
# Garamatic CI — Test/Acc Branch
# ═══════════════════════════════════════════════════════════════════════════
# Runs on every push/PR to test or acc branch.
# Smoke tests + contract compliance. Integration tests run locally.
# ═══════════════════════════════════════════════════════════════════════════

name: CI — Test/Acc

on:
  push:
    branches: [test, acc, acceptance]
    paths-ignore:
      - '**.md'
      - 'docs/**'
      - '.gitignore'
      - '.vscode/**'
      - 'LICENSE'
  pull_request:
    branches: [test, acc, acceptance]
    paths-ignore:
      - '**.md'
      - 'docs/**'
      - '.gitignore'
      - '.vscode/**'
      - 'LICENSE'

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
  COMPOSE_FILE: demo/docker-compose.yml

jobs:
  # ─── Lint & Verify ──────────────────────────────────────────────────────
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive
          token: ${{ secrets.PAT_WITH_REPO_ACCESS }}

      - name: Verify docker-compose files
        run: |
          docker compose config > /dev/null
          docker compose -f integration-tests/docker/docker-compose.test.yml config > /dev/null

  # ─── Smoke Tests ──────────────────────────────────────────────────────────
  smoke-test:
    runs-on: ubuntu-latest
    needs: lint
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive
          token: ${{ secrets.PAT_WITH_REPO_ACCESS }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Cache Docker layers
        uses: actions/cache@v4
        with:
          path: /tmp/.buildx-cache
          key: ${{ runner.os }}-buildx-${{ github.sha }}
          restore-keys: |
            ${{ runner.os }}-buildx-

      - name: Set up environment
        run: |
          cp .env.example .env
          echo "SENDGRID_API_KEY=${{ secrets.SENDGRID_API_KEY || 'SG.test-key' }}" >> .env

      - name: Start services
        run: docker compose -f demo/docker-compose.yml up --build -d

      - name: Wait for services to be healthy
        run: |
          for i in $(seq 1 30); do
            if ./scripts/health-check.sh 2>/dev/null; then
              echo "✅ All services healthy"
              exit 0
            fi
            echo "⏳ Waiting for services... ($i/30)"
            sleep 10
          done
          echo "❌ Services failed to become healthy"
          exit 1

      - name: Tear down
        if: always()
        run: docker compose -f demo/docker-compose.yml down -v

  # ─── Contract Compliance ────────────────────────────────────────────────
  contract-compliance:
    runs-on: ubuntu-latest
    needs: lint
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive
          token: ${{ secrets.PAT_WITH_REPO_ACCESS }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Cache Docker layers
        uses: actions/cache@v4
        with:
          path: /tmp/.buildx-cache
          key: ${{ runner.os }}-buildx-${{ github.sha }}
          restore-keys: |
            ${{ runner.os }}-buildx-

      - name: Set up environment
        run: |
          cp .env.example .env
          echo "SENDGRID_API_KEY=${{ secrets.SENDGRID_API_KEY || 'SG.test-key' }}" >> .env

      - name: Start services
        run: docker compose -f demo/docker-compose.yml up --build -d

      - name: Wait for services to be healthy
        run: |
          for i in $(seq 1 30); do
            if ./scripts/health-check.sh 2>/dev/null; then
              echo "✅ All services healthy"
              exit 0
            fi
            echo "⏳ Waiting for services... ($i/30)"
            sleep 10
          done
          echo "❌ Services failed to become healthy"
          exit 1

      - name: Run contract compliance tests
        run: |
          cd integration-tests
          node tests/contract-compliance.test.js

      - name: Tear down
        if: always()
        run: docker compose -f demo/docker-compose.yml down -v
