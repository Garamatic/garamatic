# ═══════════════════════════════════════════════════════════════════════════
# Garamatic Health Alert — Proactive Monitoring
# ═══════════════════════════════════════════════════════════════════════════
# Monitors the production environment and creates GitHub issues when
# services are unhealthy. Demonstrates automatic remediation for the
# Errorhandling & Logging rubric.
#
# Notifications:
#   - GitHub Issues (automated)
#   - Could be extended to Slack/Discord/email
# ═══════════════════════════════════════════════════════════════════════════

name: Health Alert — Monitoring

on:
  schedule:
    # Every 5 minutes
    - cron: '*/5 * * * *'
  workflow_dispatch:

jobs:
  health-check:
    runs-on: [self-hosted, azure, production]
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Run health check
        id: health
        run: |
          if ./scripts/health-check.sh; then
            echo "✅ All services healthy"
            echo "status=healthy" >> $GITHUB_OUTPUT
          else
            echo "❌ Health check failed"
            echo "status=unhealthy" >> $GITHUB_OUTPUT
            exit 1
          fi

      - name: Create GitHub issue on failure
        if: failure()
        uses: actions/github-script@v7
        with:
          script: |
            const { data: issues } = await github.rest.issues.listForRepo({
              owner: context.repo.owner,
              repo: context.repo.repo,
              labels: 'health-alert',
              state: 'open',
            });

            // Only create if no open alert exists
            if (issues.length === 0) {
              await github.rest.issues.create({
                owner: context.repo.owner,
                repo: context.repo.repo,
                title: `🚨 Health Alert: Services Down — ${new Date().toISOString()}`,
                body: `## Service Health Alert\n\n**Time:** ${new Date().toISOString()}\n**Runner:** ${process.env.RUNNER_NAME || 'self-hosted'}\n\nThe health check script detected failing services. Please investigate immediately.\n\n### Recent logs\nRun \`docker compose logs --tail 100\` on the production server.\n\n---\n*This issue was created automatically by the health-alert workflow.*`,
                labels: ['health-alert', 'production', 'automated']
              });
              console.log('Created health alert issue');
            } else {
              console.log('Health alert already open, skipping');
            }

      - name: Close issue on recovery
        if: success()
        uses: actions/github-script@v7
        with:
          script: |
            const { data: issues } = await github.rest.issues.listForRepo({
              owner: context.repo.owner,
              repo: context.repo.repo,
              labels: 'health-alert',
              state: 'open',
            });

            for (const issue of issues) {
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: issue.number,
                body: `✅ **Resolved:** Health check passed at ${new Date().toISOString()}. All services are back online.`
              });
              await github.rest.issues.update({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: issue.number,
                state: 'closed'
              });
            }
