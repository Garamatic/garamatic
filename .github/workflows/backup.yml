# ═══════════════════════════════════════════════════════════════════════════
# Garamatic Backup — Scheduled & On-Demand
# ═══════════════════════════════════════════════════════════════════════════
# Runs daily backups of the production environment.
# Demonstrates automatic backup strategy for the Infrastructure rubric.
#
# Backup types:
#   - full:        Complete backup (weekly)
#   - incremental: Delta backup (daily)
#
# ═══════════════════════════════════════════════════════════════════════════

name: Backup — Scheduled

on:
  schedule:
    # Daily at 2:00 AM UTC
    - cron: '0 2 * * *'
  # Manual trigger
  workflow_dispatch:
    inputs:
      backup_type:
        description: 'Backup type'
        required: true
        default: 'full'
        type: choice
        options:
          - full
          - incremental

jobs:
  backup:
    runs-on: [self-hosted, azure, production]
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Run backup
        run: |
          BACKUP_TYPE="${{ github.event.inputs.backup_type || 'incremental' }}"
          echo "💾 Starting $BACKUP_TYPE backup..."
          ./scripts/backup.sh "$BACKUP_TYPE"

      - name: Upload backup artifact
        uses: actions/upload-artifact@v4
        with:
          name: backup-${{ github.run_id }}
          path: backups/
          retention-days: 7

      - name: Backup summary
        run: |
          echo "✅ Backup complete"
          echo "📁 Files in backup dir:"
          ls -lh backups/ 2>/dev/null || echo "No backups directory"
