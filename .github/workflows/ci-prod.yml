# ═══════════════════════════════════════════════════════════════════════════
# Garamatic CI — Production / Main
# ═══════════════════════════════════════════════════════════════════════════
# Runs on every push to main (production) branch.
# Full test suite + build artifacts + deployment trigger.
# ═══════════════════════════════════════════════════════════════════════════

name: CI — Production

on:
  push:
    branches: [main]

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  # ─── Lint & Verify ──────────────────────────────────────────────────────
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive
          token: ${{ secrets.PAT_WITH_REPO_ACCESS }}

      - name: Verify docker-compose files
        run: |
          docker compose config > /dev/null
          docker compose -f integration-tests/docker/docker-compose.test.yml config > /dev/null

  # ─── Full Integration Test Suite ────────────────────────────────────────
  integration-test:
    runs-on: ubuntu-latest
    needs: lint
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive
          token: ${{ secrets.PAT_WITH_REPO_ACCESS }}

      - name: Set up environment
        run: |
          cp .env.example .env
          echo "SENDGRID_API_KEY=${{ secrets.SENDGRID_API_KEY || 'SG.test-key' }}" >> .env
          echo "AGENTIC_API_KEY=${{ secrets.AGENTIC_API_KEY || 'garamatic-agentic-secret-key' }}" >> .env

      - name: Run integration tests
        run: |
          docker compose -f integration-tests/docker/docker-compose.test.yml \
            up --build --abort-on-container-exit

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-results
          path: integration-tests/docker/test-results/

      - name: Upload test logs
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: test-logs
          path: integration-tests/docker/test-logs/

  # ─── Build & Push Docker Images ───────────────────────────────────────
  build-images:
    runs-on: ubuntu-latest
    needs: integration-test
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive
          token: ${{ secrets.PAT_WITH_REPO_ACCESS }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build all images
        run: |
          docker compose build
          docker images

      - name: Tag images with version
        run: |
          VERSION=$(git describe --tags --always --dirty)
          echo "Version: $VERSION"
          docker tag docker-ticket-masala:latest garamatic/ticket-masala:$VERSION
          docker tag docker-gatekeeper-api:latest garamatic/gatekeeper-api:$VERSION
          docker tag docker-mailing-service:latest garamatic/mailing-service:$VERSION
          docker tag docker-agentic-service:latest garamatic/agentic-service:$VERSION
          docker tag docker-event-planner:latest garamatic/event-planner:$VERSION
          docker tag docker-garamatic-web:latest garamatic/garamatic-web:$VERSION
          docker tag docker-masala-web:latest garamatic/masala-web:$VERSION
          docker tag docker-odoo-integration:latest garamatic/odoo-integration:$VERSION

  # ─── Generate Release Notes ─────────────────────────────────────────────
  release-notes:
    runs-on: ubuntu-latest
    needs: [integration-test, build-images]
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive
          token: ${{ secrets.PAT_WITH_REPO_ACCESS }}

      - name: Generate release notes
        run: |
          echo "## Garamatic Release $(git describe --tags --always --dirty)" > release-notes.md
          echo "" >> release-notes.md
          echo "### Test Results" >> release-notes.md
          echo "- Integration tests: see artifacts" >> release-notes.md
          echo "" >> release-notes.md
          echo "### Submodule Commits" >> release-notes.md
          git submodule status | while read -r line; do
            echo "- $line" >> release-notes.md
          done

      - name: Upload release notes
        uses: actions/upload-artifact@v4
        with:
          name: release-notes
          path: release-notes.md
