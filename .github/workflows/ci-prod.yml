# ═══════════════════════════════════════════════════════════════════════════
# Garamatic CI/CD — Production / Main
# ═══════════════════════════════════════════════════════════════════════════
# Runs on every push to main (production) branch.
# Full integration test suite + Docker image push to GHCR + deployment.
#
# Environments:
#   - dev     → ci-dev.yml (fast lint + secret scan)
#   - test/acc → ci-test.yml (full tests + smoke tests + contract compliance)
#   - main/prod → THIS FILE (tests + build + push + deploy)
# ═══════════════════════════════════════════════════════════════════════════

name: CI/CD — Production

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
  COMPOSE_FILE: demo/docker-compose.yml
  REGISTRY: ghcr.io
  IMAGE_PREFIX: ghcr.io/${{ github.repository_owner }}

jobs:
  # ─── Lint & Verify ──────────────────────────────────────────────────────
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive
          token: ${{ secrets.PAT_WITH_REPO_ACCESS }}

      - name: Verify docker-compose files
        run: |
          docker compose -f demo/docker-compose.yml -f demo/docker-compose.prod.yml config > /dev/null
          docker compose -f integration-tests/docker/docker-compose.test.yml config > /dev/null

      - name: Check for secrets in history
        uses: trufflesecurity/trufflehog@main
        with:
          path: ./
          base: ${{ github.event_name == 'push' && github.event.before || github.event.repository.default_branch }}
          head: HEAD
          extra_args: --debug --only-verified

  # ─── Full Integration Test Suite ────────────────────────────────────────
  integration-test:
    runs-on: ubuntu-latest
    needs: lint
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive
          token: ${{ secrets.PAT_WITH_REPO_ACCESS }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Cache Docker layers
        uses: actions/cache@v4
        with:
          path: /tmp/.buildx-cache
          key: ${{ runner.os }}-buildx-${{ github.sha }}
          restore-keys: |
            ${{ runner.os }}-buildx-

      - name: Set up environment
        run: |
          cp .env.example .env
          echo "SENDGRID_API_KEY=${{ secrets.SENDGRID_API_KEY || 'SG.test-key' }}" >> .env
          echo "AGENTIC_API_KEY=${{ secrets.AGENTIC_API_KEY || 'garamatic-agentic-secret-key' }}" >> .env

      - name: Run integration tests
        run: |
          docker compose -f integration-tests/docker/docker-compose.test.yml \
            up --build --abort-on-container-exit

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-results
          path: integration-tests/docker/test-results/

      - name: Upload test logs
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: test-logs
          path: integration-tests/docker/test-logs/

  # ─── Build & Push Docker Images ─────────────────────────────────────────
  build-push:
    runs-on: ubuntu-latest
    needs: integration-test
    if: github.ref == 'refs/heads/main'
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive
          token: ${{ secrets.PAT_WITH_REPO_ACCESS }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Cache Docker layers
        uses: actions/cache@v4
        with:
          path: /tmp/.buildx-cache
          key: ${{ runner.os }}-buildx-${{ github.sha }}
          restore-keys: |
            ${{ runner.os }}-buildx-

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push images
        run: |
          cd demo
          # Build with explicit tags
          docker compose -f docker-compose.yml build \
            --build-arg BUILD_DATE=$(date -u +%Y-%m-%dT%H:%M:%SZ) \
            --build-arg VCS_REF=${{ github.sha }}

          # Tag and push core services
          SERVICES=(ticket-masala gatekeeper-api agentic-service agentic-mcp odoo-integration mailing-service portal garamatic-web masala-web)
          for svc in "${SERVICES[@]}"; do
            IMAGE_TAG="${{ env.IMAGE_PREFIX }}/garamatic-${svc}:${{ github.sha }}"
            LATEST_TAG="${{ env.IMAGE_PREFIX }}/garamatic-${svc}:latest"
            
            docker tag "demo-${svc}" "$IMAGE_TAG"
            docker tag "demo-${svc}" "$LATEST_TAG"
            
            docker push "$IMAGE_TAG"
            docker push "$LATEST_TAG"
            echo "✅ Pushed ${svc} → ${IMAGE_TAG}"
          done

      - name: Generate image manifest
        run: |
          echo "# Production Image Manifest" > image-manifest.md
          echo "Commit: ${{ github.sha }}" >> image-manifest.md
          echo "Branch: ${{ github.ref_name }}" >> image-manifest.md
          echo "Date: $(date -u)" >> image-manifest.md
          echo "" >> image-manifest.md
          echo "| Service | Image |" >> image-manifest.md
          echo "|---------|-------|" >> image-manifest.md
          SERVICES=(ticket-masala gatekeeper-api agentic-service agentic-mcp odoo-integration mailing-service portal garamatic-web masala-web)
          for svc in "${SERVICES[@]}"; do
            echo "| ${svc} | ${{ env.IMAGE_PREFIX }}/garamatic-${svc}:${{ github.sha }} |" >> image-manifest.md
          done

      - name: Upload image manifest
        uses: actions/upload-artifact@v4
        with:
          name: image-manifest
          path: image-manifest.md

  # ─── Deploy to Production ───────────────────────────────────────────────
  deploy:
    runs-on: ubuntu-latest
    needs: build-push
    if: github.ref == 'refs/heads/main'
    environment:
      name: production
      url: https://garamatic.example.com
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive
          token: ${{ secrets.PAT_WITH_REPO_ACCESS }}

      - name: Set up environment
        run: |
          cp .env.example .env
          echo "SENDGRID_API_KEY=${{ secrets.SENDGRID_API_KEY || 'SG.test-key' }}" >> .env
          echo "AGENTIC_API_KEY=${{ secrets.AGENTIC_API_KEY || 'garamatic-agentic-secret-key' }}" >> .env

      - name: Deploy to production
        run: |
          echo "🚀 Deploying commit ${{ github.sha }} to production..."
          echo "   Images tagged with: ${{ github.sha }}"
          echo ""
          echo "   Production compose: docker compose -f demo/docker-compose.yml -f demo/docker-compose.prod.yml up -d"
          echo ""
          echo "   In a real production environment, this would:"
          echo "   1. SSH to the production server"
          echo "   2. Pull the latest images from GHCR"
          echo "   3. Run docker compose -f docker-compose.yml -f docker-compose.prod.yml up -d"
          echo "   4. Verify health checks pass"
          echo "   5. Rollback on failure"
          echo ""
          echo "   Current deployment: simulated (no production server configured)"

      - name: Health check verification
        run: |
          echo "🔍 Running health checks against production..."
          # In production, this would curl the live endpoints
          # curl -sf https://garamatic.example.com/health || exit 1
          echo "   (Simulated — production server not configured for school demo)"

      - name: Notify deployment status
        if: always()
        run: |
          if [ "${{ job.status }}" == "success" ]; then
            echo "✅ Production deployment successful"
          else
            echo "❌ Production deployment failed"
          fi
