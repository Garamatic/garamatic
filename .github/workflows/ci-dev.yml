# ═══════════════════════════════════════════════════════════════════════════
# Garamatic CI — Dev Branch
# ═══════════════════════════════════════════════════════════════════════════
# Runs on every push/PR to dev branch.
# Fast feedback: lint, compose validation, and unit test discovery.
# ═══════════════════════════════════════════════════════════════════════════

name: CI — Dev

on:
  push:
    branches: [dev]
  pull_request:
    branches: [dev]

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  # ─── Lint & Static Analysis ──────────────────────────────────────────────
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive
          token: ${{ secrets.PAT_WITH_REPO_ACCESS }}

      - name: Verify docker-compose files
        run: |
          docker compose config > /dev/null
          docker compose -f integration-tests/docker/docker-compose.test.yml config > /dev/null

      - name: Check for secrets in history
        uses: trufflesecurity/trufflehog@main
        with:
          path: ./
          base: ${{ github.event.repository.default_branch }}
          head: HEAD
          extra_args: --debug --only-verified

  # ─── Unit Test Discovery (per service) ───────────────────────────────────
  unit-test-discovery:
    runs-on: ubuntu-latest
    needs: lint
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive
          token: ${{ secrets.PAT_WITH_REPO_ACCESS }}

      - name: Discover .NET test projects
        id: dotnet-tests
        run: |
          echo "Test projects found:"
          find . -name "*.Tests.csproj" | head -20

      - name: Discover Python tests
        id: python-tests
        run: |
          echo "Python test files found:"
          find . -name "test*.py" -o -name "*_test.py" | head -20

      - name: Discover Node.js tests
        id: node-tests
        run: |
          echo "Node.js test files found:"
          find . -name "*.test.js" | head -20

  # ─── Build Validation (dry-run) ───────────────────────────────────────
  build-validation:
    runs-on: ubuntu-latest
    needs: lint
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive
          token: ${{ secrets.PAT_WITH_REPO_ACCESS }}

      - name: Validate all Dockerfiles build
        run: |
          docker compose build --dry-run

  # ─── Security Scan (SARIF) ─────────────────────────────────────────────
  security-scan:
    runs-on: ubuntu-latest
    needs: lint
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive
          token: ${{ secrets.PAT_WITH_REPO_ACCESS }}

      - name: Run Trivy vulnerability scanner
        uses: aquasecurity/trivy-action@master
        with:
          scan-type: 'fs'
          format: 'sarif'
          output: 'trivy-results.sarif'

      - name: Upload Trivy scan results
        uses: github/codeql-action/upload-sarif@v3
        if: always()
        with:
          sarif_file: 'trivy-results.sarif'
