# ═══════════════════════════════════════════════════════════════════════════
# Garamatic CI — Dev Branch
# ═══════════════════════════════════════════════════════════════════════════
# Runs on every push/PR to dev branch.
# Fast feedback: lint, compose validation, and security scan.
# ═══════════════════════════════════════════════════════════════════════════

name: CI — Dev

on:
  push:
    branches: [dev]
  pull_request:
    branches: [dev]

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
  COMPOSE_FILE: demo/docker-compose.yml

jobs:
  # ─── Lint & Static Analysis ──────────────────────────────────────────────
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive
          token: ${{ secrets.PAT_WITH_REPO_ACCESS }}

      - name: Verify docker-compose files
        run: |
          docker compose config > /dev/null
          docker compose -f integration-tests/docker/docker-compose.test.yml config > /dev/null

      - name: Check for secrets in history
        uses: trufflesecurity/trufflehog@main
        with:
          path: ./
          base: ${{ github.event.repository.default_branch }}
          head: HEAD
          extra_args: --debug --only-verified
