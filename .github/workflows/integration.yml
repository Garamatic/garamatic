# ═══════════════════════════════════════════════════════════════════════════
# Garamatic Integration CI
# ═══════════════════════════════════════════════════════════════════════════
# Runs the full integration test suite on every push/PR.
# ═══════════════════════════════════════════════════════════════════════════

name: Integration Tests

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  # ─── Lint & Verify ──────────────────────────────────────────────────────
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Verify docker-compose files
        run: |
          docker compose config > /dev/null
          docker compose -f integration-tests/docker/docker-compose.test.yml config > /dev/null

  # ─── Integration Tests ──────────────────────────────────────────────────
  test:
    runs-on: ubuntu-latest
    needs: lint
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Set up environment
        run: |
          cp .env.example .env
          echo "SENDGRID_API_KEY=${{ secrets.SENDGRID_API_KEY || 'SG.test-key' }}" >> .env

      - name: Run integration tests
        run: |
          docker compose -f integration-tests/docker/docker-compose.test.yml \
            up --build --abort-on-container-exit

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-results
          path: integration-tests/docker/test-results/

      - name: Upload test logs
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: test-logs
          path: integration-tests/docker/test-logs/
