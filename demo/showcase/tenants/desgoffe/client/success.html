<!doctype html>
<html lang="fr" data-theme="desgoffe">
    <head>
        <meta charset="UTF-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />
        <title>Demande enregistrée - Ville de Desgoffe</title>
        <link
            rel="stylesheet"
            href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css"
        />
        <script type="module" src="../../../src/main.js"></script>
    </head>

    <body
        class="bg-canvas text-text-primary min-h-screen flex flex-col items-center justify-center font-body antialiased"
    >
        <div class="glass-premium text-center space-y-6 max-w-md mx-auto p-10">
            <div
                class="inline-block p-4 rounded-full bg-surface-elevated border border-structural shadow-md"
            >
                <i class="fas fa-check-circle text-primary text-5xl"></i>
            </div>
            <h1 class="text-3xl font-heading font-bold text-secondary uppercase tracking-widest">
                Demande Enregistrée
            </h1>
            <p class="text-text-secondary leading-relaxed">
                Votre dossier a été transmis aux services municipaux.
                <br />
                Vous recevrez une confirmation par email.
            </p>
            <div id="ticketInfo" class="text-xs font-mono text-muted space-y-1 hidden">
                <p id="ticketId"></p>
                <p id="ticketQueue"></p>
            </div>
            <a href="index.html" class="btn btn-primary inline-block">
                <i class="fas fa-arrow-left mr-2"></i>
                Nouvelle demande
            </a>
        </div>
        <script>
            const raw = sessionStorage.getItem('submissionResult');
            if (raw) {
                try {
                    const result = JSON.parse(raw);
                    sessionStorage.removeItem('submissionResult');
                    if (result.ticketId) {
                        document.getElementById('ticketId').textContent =
                            `Ticket : #${result.ticketId}`;
                        document.getElementById('ticketInfo').classList.remove('hidden');
                    }
                    if (result.queue) {
                        document.getElementById('ticketQueue').textContent =
                            `File : ${result.queue}`;
                        document.getElementById('ticketInfo').classList.remove('hidden');
                    }
                } catch (e) {
                    console.error('Failed to parse submission result:', e);
                }
            }
        </script>
    </body>
</html>
