# ═══════════════════════════════════════════════════════════════════════════
# Garamatic Production Overrides
# ═══════════════════════════════════════════════════════════════════════════
# Use with: docker compose -f docker-compose.yml -f docker-compose.prod.yml up -d
#
# Production-specific settings:
# - No dev ports exposed (only reverse proxy / LB access)
# - Restart policies on all services
# - Resource limits
# - Read-only root filesystems where possible
# ═══════════════════════════════════════════════════════════════════════════

services:
  ticket-masala:
    restart: always
    deploy:
      resources:
        limits:
          cpus: '1.0'
          memory: 512M
        reservations:
          cpus: '0.25'
          memory: 256M
    read_only: true
    tmpfs:
      - /tmp

  gatekeeper-api:
    restart: always
    deploy:
      resources:
        limits:
          cpus: '0.5'
          memory: 256M

