# Garamatic Demo Environment
# Run: docker compose up --build

services:
  showcase:
    image: nginx:1.27-alpine
    container_name: garamatic_demo_showcase
    ports:
      - "8092:80"
    volumes:
      - ./showcase:/usr/share/nginx/html:ro
    networks:
      - garamatic_demo_net
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://127.0.0.1:80/"]
      interval: 5s
      timeout: 3s
      retries: 10

  rabbitmq:
    image: rabbitmq:3-management-alpine
    container_name: garamatic_demo_rabbitmq
    ports:
      - "5672:5672"
      - "15672:15672"
    networks:
      - garamatic_demo_net
    healthcheck:
      test: rabbitmq-diagnostics -q ping
      interval: 5s
      timeout: 3s
      retries: 5

  ticket-masala:
    build:
      context: ../ticket-masala
      dockerfile: Dockerfile
    container_name: garamatic_demo_ticket_masala
    ports:
      - "8085:8080"
    environment:
      - ASPNETCORE_ENVIRONMENT=Development
      - ConnectionStrings__DefaultConnection=Data Source=/app/data/masala_demo.db;Cache=Shared;Mode=ReadWriteCreate
      - MasalaConfig__ConfigPath=/app/config
      - MasalaConfig__SeedDataPath=/app/config/seed_data.json
      - MASALA_CONFIG_PATH=/app/config
      - TEST_MODE=false
      - TICKETMASALA_ALLOW_SEED_BYPASS=true
      - RabbitMQ__HostName=rabbitmq
      - OPENAI_BASE_URL=${OLLAMA_BASE_URL:-http://ollama:11434/v1}
      - OPENAI_API_KEY=${OLLAMA_API_KEY:-ollama}
      - OpenAI__Provider=ollama
      - Agentic__ApiKey=${AGENTIC_API_KEY:-garamatic-agentic-secret-key}
      - Agentic__ApiUrl=https://agentic.garamatic.tech
      - Gerda__OpenAiModelFast=qwen3.5:2b-q4_K_M
      - Gerda__OpenAiModel=qwen3.5:2b-q4_K_M
      - TENANT=${TENANT:-desgoffe}
    volumes:
      # Demo tenant config (single source of truth for demo)
      - ./tenants/desgoffe/config:/app/config:ro
      # Tenant theme and logo mounted into wwwroot (overrides baked-in assets)
      - ./tenants/desgoffe/theme/style.css:/app/wwwroot/tenants/desgoffe/style.css:ro
      - ./tenants/desgoffe/logo.png:/app/wwwroot/tenants/desgoffe/logo.png:ro
      # Fallback tenant-theme path for _Layout.cshtml
      - ./tenants/desgoffe/theme/style.css:/app/wwwroot/tenant-theme/style.css:ro
      - ./tenants/desgoffe/logo.png:/app/wwwroot/tenant-theme/logo.png:ro
      - ticket_masala_demo_data:/app/data
    networks:
      - garamatic_demo_net
    depends_on:
      rabbitmq:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "/usr/share/dotnet/dotnet", "--info"]
      interval: 5s
      timeout: 3s
      retries: 10

  gatekeeper-api:
    build:
      context: ../ticket-masala
      dockerfile: src/GatekeeperApi/Dockerfile
    container_name: garamatic_demo_gatekeeper
    ports:
      - "8086:8080"
    environment:
      - ASPNETCORE_ENVIRONMENT=Development
      - TICKET_MASALA_API_URL=http://ticket-masala:8080
      - RabbitMQ__HostName=rabbitmq
      - Gatekeeper__ApiKey=demo-api-key
    networks:
      - garamatic_demo_net
    depends_on:
      ticket-masala:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "/usr/share/dotnet/dotnet", "--info"]
      interval: 5s
      timeout: 3s
      retries: 10

  mailing-service:
    build:
      context: ../mailing-service
      dockerfile: Dockerfile
    container_name: garamatic_demo_mailing
    ports:
      - "8087:8080"
    environment:
      - ASPNETCORE_ENVIRONMENT=Development
      - RabbitMQ__Host=rabbitmq
      - RabbitMQ__Port=5672
      - RabbitMQ__Username=guest
      - RabbitMQ__Password=guest
      - SendGrid__ApiKey=${SENDGRID_API_KEY}
      - SendGrid__FromEmail=${SENDGRID_FROM_EMAIL:-demo@garamatic.io}
      - SendGrid__FromName=${SENDGRID_FROM_NAME:-Garamatic Demo}
    networks:
      - garamatic_demo_net
    depends_on:
      rabbitmq:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "/usr/share/dotnet/dotnet", "--info"]
      interval: 5s
      timeout: 3s
      retries: 10
      start_period: 30s
    restart: unless-stopped

  ollama:
    image: ollama/ollama:latest
    container_name: garamatic_demo_ollama
    ports:
      - "11434:11434"
    volumes:
      - ollama_demo_data:/root/.ollama
    networks:
      - garamatic_demo_net

  agentic-service:
    build:
      context: ../agentic-service
      dockerfile: Dockerfile
    container_name: garamatic_demo_agentic
    ports:
      - "3001:3001"
    environment:
      - CORS_ORIGINS=*
      - ticket_api_url=http://ticket-masala:8080
      - ticket_api_key=${AGENTIC_API_KEY:-garamatic-agentic-secret-key}
      - rabbitmq_host=rabbitmq
      - LLM_PROVIDER=ollama
      - LLM_MODEL=qwen3.5:2b-q4_K_M
      - LLM_BASE_URL=http://ollama:11434
      - OPENAI_API_KEY=${OPENAI_API_KEY:-}
    volumes:
      - agentic_demo_data:/app/data
    networks:
      - garamatic_demo_net
    depends_on:
      ticket-masala:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
      ollama:
        condition: service_started
    healthcheck:
      test: ["CMD-SHELL", "python -c \"import urllib.request; urllib.request.urlopen('http://localhost:3001/health')\""]
      interval: 5s
      timeout: 5s
      retries: 10

  odoo-integration:
    build:
      context: ../odoo-integration
      dockerfile: Dockerfile
    container_name: garamatic_demo_odoo_bridge
    ports:
      - "8089:8080"
    environment:
      - ASPNETCORE_ENVIRONMENT=Development
      - RabbitMQ__HostName=rabbitmq
      - RabbitMQ__Port=5672
      - RabbitMQ__UserName=guest
      - RabbitMQ__Password=guest
      - HealthChecks__Port=8080
      - LiteDb__ConnectionString=Filename=/app/data/seeded_state.db;Connection=shared
      - Odoo__BaseUrl=http://odoo:8069
      - Odoo__Database=odoo
      - Odoo__Username=admin
      - Odoo__Password=admin
      # The income account is created by odoo-seed.py with code 7000.
      # If the account module creates a different number of accounts,
      # update this ID to match the actual ID of the 'Verkoop' account.
      - Odoo__DefaultIncomeAccountId=48
    volumes:
      - odoo_demo_data:/app/data
    networks:
      - garamatic_demo_net
    depends_on:
      odoo:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "/usr/share/dotnet/dotnet", "--info"]
      interval: 5s
      timeout: 3s
      retries: 10

  mailhog:
    image: mailhog/mailhog:latest
    container_name: garamatic_demo_mailhog
    ports:
      - "1025:1025"
      - "8025:8025"
    networks:
      - garamatic_demo_net

  # ════════════════════════════════════════════════════════════
  # DESGOFFE PORTAL - Citizen Portal (React + Vite)
  # ════════════════════════════════════════════════════════════
  portal:
    build:
      context: ../portal
      dockerfile: Dockerfile
    container_name: garamatic_demo_portal
    ports:
      - "8093:80"
    networks:
      - garamatic_demo_net
    depends_on:
      gatekeeper-api:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://127.0.0.1:80/"]
      interval: 5s
      timeout: 3s
      retries: 10
    restart: unless-stopped

  # ════════════════════════════════════════════════════════════
  # GARAMATIC WEB - Architecture Dashboard
  # ════════════════════════════════════════════════════════════
  garamatic-web:
    build:
      context: ../garamatic-web
      dockerfile: Dockerfile
    container_name: garamatic_demo_garamatic_web
    ports:
      - "8090:8080"
    networks:
      - garamatic_demo_net
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://127.0.0.1:8080/"]
      interval: 5s
      timeout: 3s
      retries: 10

  # ════════════════════════════════════════════════════════════
  # MASALA WEB - Ticket Masala Marketing Site
  # ════════════════════════════════════════════════════════════
  masala-web:
    build:
      context: ../masala-web
      dockerfile: Dockerfile
    container_name: garamatic_demo_masala_web
    ports:
      - "8091:8080"
    environment:
      - MASALA_TENANT_ID=desgoffe
    networks:
      - garamatic_demo_net
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://127.0.0.1:8080/"]
      interval: 5s
      timeout: 3s
      retries: 10

  # ════════════════════════════════════════════════════════════
  # ODOO ERP - Invoice & CRM backend
  # Heavy service — may take 60-90s to become ready on first boot
  # ════════════════════════════════════════════════════════════
  odoo:
    image: odoo:17.0
    container_name: garamatic_demo_odoo
    ports:
      - "8069:8069"
    environment:
      - HOST=odoo-db
      - USER=odoo
      - PASSWORD=odoo
      - DATABASE=odoo
    volumes:
      - odoo_demo_app_data:/var/lib/odoo
      - ../odoo-integration/addons:/mnt/extra-addons:ro
      - ../scripts/odoo-init.sh:/odoo-init.sh:ro
      - ../scripts/odoo-seed.py:/odoo-seed.py:ro
    command: ["/bin/bash", "/odoo-init.sh"]
    networks:
      - garamatic_demo_net
    depends_on:
      odoo-db:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:8069/web > /dev/null 2>&1"]
      interval: 5s
      timeout: 3s
      retries: 30
      start_period: 60s

  odoo-db:
    image: postgres:15-alpine
    container_name: garamatic_demo_odoo_db
    environment:
      - POSTGRES_DB=odoo
      - POSTGRES_USER=odoo
      - POSTGRES_PASSWORD=odoo
    volumes:
      - odoo_demo_db_data:/var/lib/postgresql/data
    networks:
      - garamatic_demo_net
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U odoo -d odoo"]
      interval: 10s
      timeout: 5s
      retries: 5

  seeder:
    build:
      context: ./seeding
      dockerfile: Dockerfile
    container_name: garamatic_demo_seeder
    environment:
      - TICKET_MASALA_URL=http://ticket-masala:8080
      - GATEKEEPER_URL=http://gatekeeper-api:8080
      - MAILING_URL=http://mailing-service:8080
      - AGENTIC_URL=http://agentic-service:3001
      - ODOO_URL=http://odoo-integration:8080
      - RABBITMQ_URL=http://rabbitmq:15672
      - MAILHOG_URL=http://mailhog:8025
      - GATEKEEPER_API_KEY=demo-api-key
      - SEED_COUNT=1
      - TENANT=${TENANT:-desgoffe}
    volumes:
      # Demo tenant config for seeding
      - ./tenants/desgoffe/config:/seed-data/ticket-masala:ro
      - odoo_demo_data:/seed-data/odoo
    networks:
      - garamatic_demo_net
    depends_on:
      ticket-masala:
        condition: service_healthy
      gatekeeper-api:
        condition: service_healthy
      mailing-service:
        condition: service_healthy
      agentic-service:
        condition: service_healthy
      odoo-integration:
        condition: service_healthy
      mailhog:
        condition: service_started
      rabbitmq:
        condition: service_healthy
    restart: "no"

networks:
  garamatic_demo_net:
    driver: bridge

volumes:
  ticket_masala_demo_data:
  odoo_demo_data:
  odoo_demo_app_data:
  odoo_demo_db_data:
  ollama_demo_data:
  agentic_demo_data:

