# Garamatic Demo Environment
# Run: docker compose up --build

services:
  showcase:
    image: nginx:1.27-alpine
    container_name: garamatic_demo_showcase
    ports:
      - "8092:80"
    volumes:
      - ./showcase:/usr/share/nginx/html:ro
    networks:
      - garamatic_demo_net
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://127.0.0.1:80/"]
      interval: 5s
      timeout: 3s
      retries: 10

  rabbitmq:
    image: rabbitmq:3-management-alpine
    container_name: garamatic_demo_rabbitmq
    ports:
      - "${RABBITMQ_AMQP_PORT:-5672}:5672"
      - "${RABBITMQ_MGMT_PORT:-15672}:15672"
    networks:
      - garamatic_demo_net
    healthcheck:
      test: rabbitmq-diagnostics -q ping
      interval: 5s
      timeout: 3s
      retries: 5

  ticket-masala:
    build:
      context: ../ticket-masala
      dockerfile: Dockerfile
    container_name: garamatic_demo_ticket_masala
    user: root
    ports:
      - "8085:8080"
    environment:
      - ASPNETCORE_ENVIRONMENT=Development
      - ConnectionStrings__DefaultConnection=Data Source=/app/data/masala_demo.db;Mode=ReadWriteCreate
      - MASALA_CONFIG_PATH=/app/config
      - TEST_MODE=false
      - TICKETMASALA_ALLOW_SEED_BYPASS=true
      - RabbitMQ__HostName=rabbitmq
      - OPENAI_BASE_URL=${LLAMA_BASE_URL:-http://llama:8080/v1}
      - OPENAI_API_KEY=${LLAMA_API_KEY:-sk-llama}
      - OpenAI__Provider=llamacpp
      - Agentic__ApiKey=${AGENTIC_API_KEY:-garamatic-agentic-secret-key}
      - Agentic__ApiUrl=${AGENTIC_PUBLIC_URL:-http://localhost:3001}
      - Masala__Gerda__OpenAiModelFast=${GERDA_MODEL_FAST:-qwen3.5:2b-q4_K_M}
      - Masala__Gerda__OpenAiModel=${GERDA_MODEL:-qwen3.5:2b-q4_K_M}
      - MASALA_TENANT=${TENANT:-desgoffe}
      - OTEL_EXPORTER_OTLP_ENDPOINT=http://tempo:4318
      - OTEL_EXPORTER_OTLP_PROTOCOL=http/protobuf
      - OTEL_SERVICE_NAME=ticket-masala
      - OTEL_RESOURCE_ATTRIBUTES=service.namespace=garamatic,deployment.environment=local
    volumes:
      # Demo tenant config (single source of truth for demo)
      - ./tenants/desgoffe/config:/app/config:ro
      # Tenant theme and logo mounted into wwwroot (overrides baked-in assets)
      - ./tenants/desgoffe/theme/style.css:/app/wwwroot/tenants/desgoffe/style.css:ro
      - ./tenants/desgoffe/logo.png:/app/wwwroot/tenants/desgoffe/logo.png:ro
      # Fallback tenant-theme path for _Layout.cshtml
      - ./tenants/desgoffe/theme/style.css:/app/wwwroot/tenant-theme/style.css:ro
      - ./tenants/desgoffe/logo.png:/app/wwwroot/tenant-theme/logo.png:ro
    tmpfs:
      - /app/data
    networks:
      - garamatic_demo_net
    restart: unless-stopped
    depends_on:
      rabbitmq:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "dotnet", "/app/healthcheck/healthcheck.dll"]
      interval: 10s
      timeout: 5s
      start_period: 60s
      retries: 10

  gatekeeper-api:
    build:
      context: ../ticket-masala
      dockerfile: src/GatekeeperApi/Dockerfile
    container_name: garamatic_demo_gatekeeper
    ports:
      - "8086:8080"
    environment:
      - ASPNETCORE_ENVIRONMENT=Development
      - RabbitMQ__HostName=rabbitmq
      - Gatekeeper__ApiKey=demo-api-key
      - OTEL_EXPORTER_OTLP_ENDPOINT=http://tempo:4318
      - OTEL_EXPORTER_OTLP_PROTOCOL=http/protobuf
      - OTEL_SERVICE_NAME=gatekeeper-api
      - OTEL_RESOURCE_ATTRIBUTES=service.namespace=garamatic,deployment.environment=local
    networks:
      - garamatic_demo_net
    depends_on:
      ticket-masala:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "dotnet", "/app/healthcheck/healthcheck.dll"]
      interval: 10s
      timeout: 5s
      start_period: 60s
      retries: 10

  mailing-service:
    build:
      context: ../mailing-service
      dockerfile: Dockerfile
    container_name: garamatic_demo_mailing
    ports:
      - "8087:8080"
    environment:
      - ASPNETCORE_ENVIRONMENT=Development
      - RabbitMQ__Host=rabbitmq
      - RabbitMQ__Port=5672
      - RabbitMQ__Username=guest
      - RabbitMQ__Password=guest
      - SendGrid__ApiKey=${SENDGRID_API_KEY}
      - SendGrid__FromEmail=${SENDGRID_FROM_EMAIL:-demo@garamatic.io}
      - SendGrid__FromName=${SENDGRID_FROM_NAME:-Garamatic Demo}
      - Mailhog__Host=mailhog
      - Mailhog__Port=1025
      - RateLimit__MaxEmailsPerDay=100
      - RateLimit__MinIntervalSeconds=5
      - OTEL_EXPORTER_OTLP_ENDPOINT=http://tempo:4318
      - OTEL_EXPORTER_OTLP_PROTOCOL=http/protobuf
      - OTEL_SERVICE_NAME=mailing-service
      - OTEL_RESOURCE_ATTRIBUTES=service.namespace=garamatic,deployment.environment=local
    networks:
      - garamatic_demo_net
    depends_on:
      rabbitmq:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "dotnet", "/app/healthcheck/healthcheck.dll"]
      interval: 10s
      timeout: 5s
      start_period: 60s
      retries: 10
    restart: unless-stopped

  llama:
    image: ghcr.io/ggml-org/llama.cpp:server
    container_name: garamatic_demo_llama
    ports:
      - "11434:8080"
    environment:
      - LLAMA_ARG_HOST=0.0.0.0
      - LLAMA_ARG_PORT=8080
      - LLAMA_ARG_CTX_SIZE=4096
    command: >
      -hf unsloth/Qwen3.5-2B-GGUF:UD-Q4_K_XL --alias qwen3.5:2b-q4_K_M
      --jinja
      --reasoning-budget 0
      --parallel 1
      --cache-reuse 256
    volumes:
      # Persist the downloaded model (~1.1 GB) so container recreation
      # doesn't re-download it — first boot still needs network access.
      - llama_model_cache:/root/.cache/llama.cpp
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:8080/health || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 60
      start_period: 300s
    networks:
      - garamatic_demo_net

  agentic-service:
    build:
      context: ../agentic-service
      dockerfile: Dockerfile
    container_name: garamatic_demo_agentic
    ports:
      - "3001:3001"
    environment:
      - CORS_ORIGINS=*
      - ticket_api_url=http://ticket-masala:8080
      - ticket_api_key=${AGENTIC_API_KEY:-garamatic-agentic-secret-key}
      - odoo_bridge_url=http://odoo-integration:8080
      - rabbitmq_host=rabbitmq
      # LLM defaults to local llama.cpp; set LLM_PROVIDER=openrouter,
      # LLM_MODEL=<openrouter model>, LLM_BASE_URL=https://openrouter.ai/api/v1
      # in .env to fall back to OpenRouter (key picked up automatically).
      - LLM_PROVIDER=${LLM_PROVIDER:-llamacpp}
      - LLM_MODEL=${LLM_MODEL:-qwen3.5:2b-q4_K_M}
      - LLM_BASE_URL=${LLM_BASE_URL:-http://llama:8080/v1}
      - OPENAI_API_KEY=${OPENROUTER_API_KEY:-}
      - API_KEY=${AGENTIC_API_KEY:-garamatic-agentic-secret-key}
      - AGENT_DB_PATH=/app/data/approvals.db
      - OTEL_EXPORTER_OTLP_ENDPOINT=http://tempo:4318
      - OTEL_SERVICE_NAME=agentic-service
      - OTEL_RESOURCE_ATTRIBUTES=service.namespace=garamatic,deployment.environment=local
    command: ["garamatic-api"]
    tmpfs:
      - /app/data
    networks:
      - garamatic_demo_net
    depends_on:
      ticket-masala:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
      llama:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "python -c \"import urllib.request; urllib.request.urlopen('http://localhost:3001/health')\""]
      interval: 5s
      timeout: 5s
      retries: 10

  agentic-mcp:
    build:
      context: ../agentic-service
      dockerfile: Dockerfile
    container_name: garamatic_demo_agentic_mcp
    ports:
      - "${AGENTIC_MCP_PORT:-3002}:3001"
    environment:
      - CORS_ORIGINS=*
      - ticket_api_url=http://ticket-masala:8080
      - ticket_api_key=${AGENTIC_API_KEY:-garamatic-agentic-secret-key}
      - API_KEY=${AGENTIC_API_KEY:-garamatic-agentic-secret-key}
      - odoo_bridge_url=http://odoo-integration:8080
      - rabbitmq_host=rabbitmq
      - LLM_PROVIDER=${LLM_PROVIDER:-llamacpp}
      - LLM_MODEL=${LLM_MODEL:-qwen3.5:2b-q4_K_M}
      - LLM_BASE_URL=${LLM_BASE_URL:-http://llama:8080/v1}
      - OPENAI_API_KEY=${OPENROUTER_API_KEY:-}
      - AGENT_DB_PATH=/app/data/approvals.db
      - MCP_TRANSPORT=streamable-http
      - OTEL_EXPORTER_OTLP_ENDPOINT=http://tempo:4318
      - OTEL_SERVICE_NAME=agentic-mcp
      - OTEL_RESOURCE_ATTRIBUTES=service.namespace=garamatic,deployment.environment=local
    command: ["garamatic-mcp"]
    tmpfs:
      - /app/data
    networks:
      - garamatic_demo_net
    depends_on:
      ticket-masala:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
      llama:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "python -c \"import urllib.request; urllib.request.urlopen('http://localhost:3001/health')\""]
      interval: 5s
      timeout: 5s
      retries: 10
    restart: unless-stopped

  agentic-consumer:
    build:
      context: ../agentic-service
      dockerfile: Dockerfile
    container_name: garamatic_demo_agentic_consumer
    environment:
      - rabbitmq_host=rabbitmq
      - ticket_api_url=http://ticket-masala:8080
      - ticket_api_key=${AGENTIC_API_KEY:-garamatic-agentic-secret-key}
      - LLM_PROVIDER=${LLM_PROVIDER:-llamacpp}
      - LLM_MODEL=${LLM_MODEL:-qwen3.5:2b-q4_K_M}
      - LLM_BASE_URL=${LLM_BASE_URL:-http://llama:8080/v1}
      - OPENAI_API_KEY=${OPENROUTER_API_KEY:-}
      - AGENT_DB_PATH=/app/data/approvals.db
    command: ["garamatic-consumer"]
    tmpfs:
      - /app/data
    networks:
      - garamatic_demo_net
    depends_on:
      ticket-masala:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
      llama:
        condition: service_healthy
    restart: unless-stopped

  odoo-integration:
    build:
      context: ../odoo-integration
      dockerfile: Dockerfile
    container_name: garamatic_demo_odoo_bridge
    user: root
    ports:
      - "8089:8080"
    environment:
      - ASPNETCORE_ENVIRONMENT=Development
      - RabbitMQ__HostName=rabbitmq
      - RabbitMQ__Port=5672
      - RabbitMQ__UserName=guest
      - RabbitMQ__Password=guest
      - HealthChecks__Port=8080
      - LiteDb__ConnectionString=Filename=/app/data/seeded_state.db;Connection=shared
      - Odoo__BaseUrl=http://odoo:8069
      - Odoo__Database=odoo
      - Odoo__Username=admin
      - Odoo__Password=admin
      # The income account is created by odoo-seed.py with code 7000.
      # If the account module creates a different number of accounts,
      # update this ID to match the actual ID of the 'Verkoop' account.
      - Odoo__DefaultIncomeAccountId=48
      - OTEL_EXPORTER_OTLP_ENDPOINT=http://tempo:4318
      - OTEL_EXPORTER_OTLP_PROTOCOL=http/protobuf
      - OTEL_SERVICE_NAME=odoo-integration
      - OTEL_RESOURCE_ATTRIBUTES=service.namespace=garamatic,deployment.environment=local
    tmpfs:
      - /app/data
    networks:
      - garamatic_demo_net
    depends_on:
      odoo:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "dotnet", "/app/healthcheck/healthcheck.dll"]
      interval: 10s
      timeout: 5s
      start_period: 90s
      retries: 9

  mailhog:
    image: mailhog/mailhog:latest
    container_name: garamatic_demo_mailhog
    ports:
      - "1025:1025"
      - "8025:8025"
    networks:
      - garamatic_demo_net

  # ════════════════════════════════════════════════════════════
  # DESGOFFE PORTAL - Citizen Portal (React + Vite)
  # ════════════════════════════════════════════════════════════
  portal:
    build:
      context: ../portal
      dockerfile: Dockerfile
    container_name: garamatic_demo_portal
    ports:
      - "8093:80"
    networks:
      - garamatic_demo_net
    depends_on:
      gatekeeper-api:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://127.0.0.1:80/"]
      interval: 5s
      timeout: 3s
      retries: 10
    restart: unless-stopped

  # ════════════════════════════════════════════════════════════
  # GARAMATIC WEB - Architecture Dashboard
  # ════════════════════════════════════════════════════════════
  garamatic-web:
    build:
      context: ../garamatic-web
      dockerfile: Dockerfile
    container_name: garamatic_demo_garamatic_web
    ports:
      - "8090:8080"
    networks:
      - garamatic_demo_net
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://127.0.0.1:8080/"]
      interval: 5s
      timeout: 3s
      retries: 10

  # ════════════════════════════════════════════════════════════
  # MASALA WEB - Ticket Masala Marketing Site
  # ════════════════════════════════════════════════════════════
  masala-web:
    build:
      context: ../masala-web
      dockerfile: Dockerfile
    container_name: garamatic_demo_masala_web
    ports:
      - "8091:8080"
    environment:
      - MASALA_TENANT_ID=desgoffe
    networks:
      - garamatic_demo_net
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://127.0.0.1:8080/"]
      interval: 5s
      timeout: 3s
      retries: 10

  # ════════════════════════════════════════════════════════════
  # ODOO ERP - Invoice & CRM backend
  # Heavy service — may take 60-90s to become ready on first boot
  # ════════════════════════════════════════════════════════════
  odoo:
    image: odoo:17.0
    container_name: garamatic_demo_odoo
    user: root
    ports:
      - "8069:8069"
    environment:
      - HOST=odoo-db
      - USER=odoo
      - PASSWORD=odoo
      - DATABASE=odoo
    volumes:
      - ../odoo-integration/addons:/mnt/extra-addons:ro
      - ../scripts/odoo-init.sh:/odoo-init.sh:ro
      - ../scripts/odoo-seed.py:/odoo-seed.py:ro
    tmpfs:
      - /var/lib/odoo
    command: ["/bin/bash", "/odoo-init.sh"]
    networks:
      - garamatic_demo_net
    depends_on:
      odoo-db:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:8069/web > /dev/null 2>&1"]
      interval: 5s
      timeout: 3s
      retries: 30
      start_period: 60s

  odoo-db:
    image: postgres:15-alpine
    container_name: garamatic_demo_odoo_db
    environment:
      - POSTGRES_DB=odoo
      - POSTGRES_USER=odoo
      - POSTGRES_PASSWORD=odoo
    tmpfs:
      - /var/lib/postgresql/data
    networks:
      - garamatic_demo_net
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U odoo -d odoo"]
      interval: 10s
      timeout: 5s
      retries: 5

  seeder:
    build:
      context: ./seeding
      dockerfile: Dockerfile
    container_name: garamatic_demo_seeder
    environment:
      - TICKET_MASALA_URL=http://ticket-masala:8080
      - GATEKEEPER_URL=http://gatekeeper-api:8080
      - MAILING_URL=http://mailing-service:8080
      - AGENTIC_URL=http://agentic-service:3001
      - ODOO_URL=http://odoo-integration:8080
      - RABBITMQ_URL=http://rabbitmq:15672
      - MAILHOG_URL=http://mailhog:8025
      - GATEKEEPER_API_KEY=demo-api-key
      - SEED_COUNT=1
      - TENANT=${TENANT:-desgoffe}
      - AGENTIC_API_KEY=${AGENTIC_API_KEY:-garamatic-agentic-secret-key}
    volumes:
      # Demo tenant config for seeding
      - ./tenants/desgoffe/config:/seed-data/ticket-masala:ro
    tmpfs:
      - /seed-data/odoo
    networks:
      - garamatic_demo_net
    depends_on:
      ticket-masala:
        condition: service_healthy
      gatekeeper-api:
        condition: service_healthy
      mailing-service:
        condition: service_healthy
      agentic-service:
        condition: service_healthy
      odoo-integration:
        condition: service_healthy
      mailhog:
        condition: service_started
      rabbitmq:
        condition: service_healthy
    restart: "no"

  # ════════════════════════════════════════════════════════════
  # PROMETHEUS — Metrics collection
  # ════════════════════════════════════════════════════════════
  prometheus:
    image: prom/prometheus:latest
    container_name: garamatic_prometheus
    user: root
    ports:
      - "9090:9090"
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
      - '--storage.tsdb.path=/prometheus'
    volumes:
      - ../monitoring/prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
    tmpfs:
      - /prometheus
    networks:
      - garamatic_demo_net
    restart: unless-stopped

  # ════════════════════════════════════════════════════════════
  # LOKI — Log aggregation
  # ════════════════════════════════════════════════════════════
  loki:
    image: grafana/loki:3.0.0
    container_name: garamatic_loki
    ports:
      - "3100:3100"
    command: -config.file=/etc/loki/local-config.yaml
    user: root
    volumes:
      - ../monitoring/loki/loki.yml:/etc/loki/local-config.yaml:ro
    tmpfs:
      - /tmp/loki
    networks:
      - garamatic_demo_net
    restart: unless-stopped

  # ════════════════════════════════════════════════════════════
  # PROMTAIL — Log shipping to Loki
  # ════════════════════════════════════════════════════════════
  promtail:
    image: grafana/promtail:3.0.0
    container_name: garamatic_promtail
    volumes:
      - ../monitoring/promtail/config.yml:/etc/promtail/config.yml:ro
      - /var/run/docker.sock:/var/run/docker.sock:ro
    tmpfs:
      - /tmp
    command: -config.file=/etc/promtail/config.yml
    networks:
      - garamatic_demo_net
    restart: unless-stopped
    depends_on:
      - loki

  # ════════════════════════════════════════════════════════════
  # TEMPO — Distributed tracing
  # ════════════════════════════════════════════════════════════
  tempo:
    image: grafana/tempo:latest
    container_name: garamatic_tempo
    user: root
    ports:
      - "3200:3200"
      - "4317:4317"
      - "4318:4318"
    volumes:
      - ../monitoring/tempo:/etc/tempo:ro
    tmpfs:
      - /tmp/tempo
    networks:
      - garamatic_demo_net
    restart: unless-stopped
    command: ["-config.file=/etc/tempo/tempo.yml"]

  # ════════════════════════════════════════════════════════════
  # CADVISOR — Container metrics
  # ════════════════════════════════════════════════════════════
  cadvisor:
    image: gcr.io/cadvisor/cadvisor:v0.49.1
    container_name: garamatic_cadvisor
    privileged: true
    ports:
      - "8094:8080"
    volumes:
      - /:/rootfs:ro
      - /var/run:/var/run:ro
      - /sys:/sys:ro
      - /var/lib/docker/:/var/lib/docker:ro
      - /dev/disk/:/dev/disk:ro
    networks:
      - garamatic_demo_net
    restart: unless-stopped

  # ════════════════════════════════════════════════════════════
  # GRAFANA — Unified observability UI
  # ════════════════════════════════════════════════════════════
  grafana:
    image: grafana/grafana:11.0.0
    container_name: garamatic_grafana
    ports:
      - "3000:3000"
    environment:
      - GF_SECURITY_ADMIN_PASSWORD=${GRAFANA_ADMIN_PASSWORD:-admin}
      - GF_USERS_ALLOW_SIGN_UP=false
      - GF_SERVER_ROOT_URL=http://localhost:3000
      - GF_AUTH_ANONYMOUS_ENABLED=true
      - GF_AUTH_ANONYMOUS_ORG_NAME=Garamatic
    volumes:
      - ../monitoring/grafana/dashboards:/etc/grafana/provisioning/dashboards:ro
      - ../monitoring/grafana/datasources:/etc/grafana/provisioning/datasources:ro
    tmpfs:
      - /var/lib/grafana
    networks:
      - garamatic_demo_net
    restart: unless-stopped
    depends_on:
      - prometheus
      - loki
      - tempo
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:3000/api/health"]
      interval: 30s
      timeout: 10s
      retries: 3

  # ════════════════════════════════════════════════════════════
  # HEALTH DASHBOARD — Lightweight JSON API + HTML UI
  # ════════════════════════════════════════════════════════════
  heartbeat-monitor:
    image: python:3.11-slim
    container_name: garamatic_heartbeat_monitor
    ports:
      - "8084:8080"
    environment:
      - RABBITMQ_HOST=rabbitmq
      - RABBITMQ_PORT=5672
      - RABBITMQ_USER=guest
      - RABBITMQ_PASS=guest
      - HEARTBEAT_TIMEOUT=3.0
      - PORT=8080
    volumes:
      - ../scripts/heartbeat-monitor.py:/app/heartbeat-monitor.py:ro
      - ../scripts/heartbeat-publisher.py:/app/heartbeat-publisher.py:ro
      - ../monitoring/dashboard/simple.html:/app/simple.html:ro
    working_dir: /app
    command: ["sh", "-c", "pip install pika --quiet && python heartbeat-monitor.py"]
    networks:
      - garamatic_demo_net
    depends_on:
      rabbitmq:
        condition: service_healthy
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "python -c \"import urllib.request; urllib.request.urlopen('http://localhost:8080/health')\""]
      interval: 5s
      timeout: 3s
      retries: 5

  heartbeat-publisher:
    image: python:3.11-slim
    container_name: garamatic_heartbeat_publisher
    environment:
      - RABBITMQ_HOST=rabbitmq
      - RABBITMQ_PORT=5672
      - RABBITMQ_USER=guest
      - RABBITMQ_PASS=guest
      - HEARTBEAT_INTERVAL=1.0
    volumes:
      - ../scripts/heartbeat-publisher.py:/app/heartbeat-publisher.py:ro
    working_dir: /app
    command: ["sh", "-c", "pip install pika --quiet && python heartbeat-publisher.py --all"]
    networks:
      - garamatic_demo_net
    depends_on:
      rabbitmq:
        condition: service_healthy
    restart: unless-stopped

  health-dashboard:
    image: nginx:alpine
    container_name: garamatic_health_dashboard
    ports:
      - "${HEALTH_DASHBOARD_PORT:-3003}:80"
    volumes:
      - ../monitoring/dashboard:/usr/share/nginx/html:ro
    networks:
      - garamatic_demo_net
    depends_on:
      heartbeat-monitor:
        condition: service_healthy
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://127.0.0.1:80/"]
      interval: 5s
      timeout: 3s
      retries: 10

networks:
  garamatic_demo_net:
    name: garamatic_demo_net
    driver: bridge

volumes:
  # Exception to the ephemeral rule below: caches the llama.cpp model file
  # (no demo state lives here, only the ~1.1 GB GGUF download).
  llama_model_cache:

# Ephemeral demo — all data lives in tmpfs (memory) and is lost on restart
# No named volumes = no persistent state between demo runs
