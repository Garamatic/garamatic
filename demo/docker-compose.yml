# Garamatic Demo Environment
# Run: docker compose up --build

services:
  showcase:
    image: nginx:1.27-alpine
    container_name: garamatic_demo_showcase
    ports:
      - "8092:80"
    volumes:
      - ./showcase:/usr/share/nginx/html:ro
    networks:
      - garamatic_demo_net
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:80/"]
      interval: 5s
      timeout: 3s
      retries: 10

  rabbitmq:
    image: rabbitmq:3-management-alpine
    container_name: garamatic_demo_rabbitmq
    ports:
      - "5672:5672"
      - "15672:15672"
    networks:
      - garamatic_demo_net
    healthcheck:
      test: rabbitmq-diagnostics -q ping
      interval: 5s
      timeout: 3s
      retries: 5

  ticket-masala:
    build:
      context: ../ticket-masala
      dockerfile: Dockerfile
    container_name: garamatic_demo_ticket_masala
    ports:
      - "8085:8080"
    environment:
      - ASPNETCORE_ENVIRONMENT=Development
      - ConnectionStrings__DefaultConnection=Data Source=/app/data/masala_demo.db;Cache=Shared;Mode=ReadWriteCreate
      - MasalaConfig__ConfigPath=/app/config
      - MasalaConfig__SeedDataPath=/app/config/seed_data.json
      - TEST_MODE=false
      - RabbitMQ__HostName=rabbitmq
      - OPENAI_BASE_URL=${OLLAMA_BASE_URL:-http://ollama:11434/v1}
      - OPENAI_API_KEY=${OLLAMA_API_KEY:-ollama}
      - OpenAI__Provider=ollama
    volumes:
      - ../ticket-masala/config:/app/config:ro
      - ticket_masala_demo_data:/app/data
    networks:
      - garamatic_demo_net
    depends_on:
      rabbitmq:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/health"]
      interval: 5s
      timeout: 3s
      retries: 10

  gatekeeper-api:
    build:
      context: ../ticket-masala
      dockerfile: src/GatekeeperApi/Dockerfile
    container_name: garamatic_demo_gatekeeper
    ports:
      - "8086:8080"
    environment:
      - ASPNETCORE_ENVIRONMENT=Development
      - TICKET_MASALA_API_URL=http://ticket-masala:8080
      - RabbitMQ__HostName=rabbitmq
      - Gatekeeper__ApiKey=demo-api-key
    networks:
      - garamatic_demo_net
    depends_on:
      ticket-masala:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/health"]
      interval: 5s
      timeout: 3s
      retries: 10

  mailing-service:
    build:
      context: ../mailing-service
      dockerfile: Dockerfile
    container_name: garamatic_demo_mailing
    ports:
      - "8087:8080"
    environment:
      - ASPNETCORE_ENVIRONMENT=Development
      - RabbitMQ__Host=rabbitmq
      - RabbitMQ__Port=5672
      - RabbitMQ__Username=guest
      - RabbitMQ__Password=guest
      - SendGrid__ApiKey=SG.demo-key
      - SendGrid__FromEmail=demo@garamatic.io
      - SendGrid__FromName=Garamatic Demo
    networks:
      - garamatic_demo_net
    depends_on:
      rabbitmq:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/health"]
      interval: 5s
      timeout: 3s
      retries: 10

  ollama:
    image: ollama/ollama:latest
    container_name: garamatic_demo_ollama
    ports:
      - "11434:11434"
    volumes:
      - ollama_demo_data:/root/.ollama
    networks:
      - garamatic_demo_net

  agentic-service:
    build:
      context: ../agentic-service
      dockerfile: Dockerfile
    container_name: garamatic_demo_agentic
    ports:
      - "3001:3001"
    environment:
      - MCP_TRANSPORT=sse
      - ticket_api_url=http://ticket-masala:8080
      - rabbitmq_host=rabbitmq
      - LLM_PROVIDER=ollama
      - LLM_MODEL=qwen3.5:2b
      - LLM_BASE_URL=http://ollama:11434
      - OPENAI_API_KEY=${OPENAI_API_KEY:-}
    networks:
      - garamatic_demo_net
    depends_on:
      ticket-masala:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
      ollama:
        condition: service_started
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3001/health"]
      interval: 5s
      timeout: 3s
      retries: 10

  odoo-integration:
    build:
      context: ../odoo-integration
      dockerfile: Dockerfile
    container_name: garamatic_demo_odoo
    ports:
      - "8089:8080"
    environment:
      - ASPNETCORE_ENVIRONMENT=Development
      - RabbitMQ__HostName=rabbitmq
      - RabbitMQ__Port=5672
      - RabbitMQ__UserName=guest
      - RabbitMQ__Password=guest
      - HealthChecks__Port=8080
      - LiteDb__ConnectionString=Filename=/app/data/seeded_state.db;Connection=shared
      - OdooOptions__BaseUrl=${ODOO_URL:-http://localhost:8069}
      - OdooOptions__Database=${ODOO_DB:-odoo}
      - OdooOptions__Username=${ODOO_USER:-admin}
      - OdooOptions__Password=${ODOO_PASS:-admin}
    volumes:
      - odoo_demo_data:/app/data
    networks:
      - garamatic_demo_net
    depends_on:
      rabbitmq:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/health"]
      interval: 5s
      timeout: 3s
      retries: 10

  event-planner:
    build:
      context: ../event-planner
      dockerfile: Dockerfile
    container_name: garamatic_demo_event_planner
    ports:
      - "8088:80"
    environment:
      - DRUPAL_ENV=development
      - TICKET_MASALA_API=http://ticket-masala:8080
    networks:
      - garamatic_demo_net
    depends_on:
      event-planner-db:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:80"]
      interval: 5s
      timeout: 3s
      retries: 10

  event-planner-db:
    image: mariadb:10.11
    container_name: garamatic_demo_event_planner_db
    environment:
      - MYSQL_ROOT_PASSWORD=rootpass
      - MYSQL_DATABASE=drupal
      - MYSQL_USER=drupal
      - MYSQL_PASSWORD=drupal
    volumes:
      - event_planner_demo_db_data:/var/lib/mysql
    networks:
      - garamatic_demo_net
    healthcheck:
      test: ["CMD-SHELL", "mariadb-admin ping -u drupal -pdrupal || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5

  mailhog:
    image: mailhog/mailhog:latest
    container_name: garamatic_demo_mailhog
    ports:
      - "1025:1025"
      - "8025:8025"
    networks:
      - garamatic_demo_net

  seeder:
    build:
      context: ./seeding
      dockerfile: Dockerfile
    container_name: garamatic_demo_seeder
    environment:
      - TICKET_MASALA_URL=http://ticket-masala:8080
      - GATEKEEPER_URL=http://gatekeeper-api:8080
      - MAILING_URL=http://mailing-service:8080
      - AGENTIC_URL=http://agentic-service:3001
      - ODOO_URL=http://odoo-integration:8080
      - EVENT_PLANNER_URL=http://event-planner:80
      - RABBITMQ_URL=http://rabbitmq:15672
      - MAILHOG_URL=http://mailhog:8025
      - GATEKEEPER_API_KEY=demo-api-key
      - SEED_COUNT=1
    volumes:
      - ../ticket-masala/config:/seed-data/ticket-masala:ro
      - odoo_demo_data:/seed-data/odoo
    networks:
      - garamatic_demo_net
    depends_on:
      ticket-masala:
        condition: service_healthy
      gatekeeper-api:
        condition: service_healthy
      mailing-service:
        condition: service_healthy
      agentic-service:
        condition: service_healthy
      odoo-integration:
        condition: service_healthy
      event-planner:
        condition: service_healthy
      mailhog:
        condition: service_started
      rabbitmq:
        condition: service_healthy
    restart: "no"

networks:
  garamatic_demo_net:
    driver: bridge

volumes:
  ticket_masala_demo_data:
  event_planner_demo_db_data:
  odoo_demo_data:
  ollama_demo_data:
