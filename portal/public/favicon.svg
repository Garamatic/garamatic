<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" role="img" aria-labelledby="desgoffe-title desgoffe-desc">
  <title id="desgoffe-title">Ville de Desgoffe Logo (Simplified)</title>
  <desc id="desgoffe-desc">A modernized, minimalist version of the municipal seal for Desgoffe-sur-Semois.</desc>

  <defs>
    <!-- Original shield shape -->
    <path id="shield" d="M256 116C226 135 195 143 158 149V232C158 292 196 342 256 379C316 342 354 292 354 232V149C317 143 286 135 256 116Z" />
    <clipPath id="shield-clip">
      <use href="#shield" />
    </clipPath>
  </defs>

  <!-- Scale up the shield to better fill the space -->
  <g transform="translate(256 256) scale(1.6) translate(-256 -256)">

    <g clip-path="url(#shield-clip)">
      <!-- Gold Base -->
      <rect x="0" y="0" width="512" height="512" fill="#D4A574" />

      <!-- Green Top -->
      <rect x="0" y="0" width="512" height="235" fill="#2D5A3D" />

      <!-- Blue River (Wavy) -->
      <path d="M0 235 C 100 210, 160 260, 256 250 C 352 240, 412 210, 512 235 V 285 C 412 260, 352 290, 256 300 C 160 310, 100 260, 0 285 Z" fill="#2F6F8F" />

      <!-- Minimalist Castle -->
      <g fill="#FDF5E6">
        <!-- Main block -->
        <rect x="215" y="175" width="82" height="60" />
        <!-- Top block (below roof) -->
        <rect x="233" y="145" width="46" height="30" />
        <!-- Pointy Roof -->
        <path d="M225 145 L 256 115 L 287 145 Z" />
      </g>
      <!-- Base step (gold) -->
      <rect x="221" y="220" width="70" height="15" fill="#D4A574" />

      <!-- Door -->
      <path d="M246 235 V 205 C 246 195, 266 195, 266 205 V 235 Z" fill="#5D3A5D" />
      <!-- Windows -->
      <rect x="226" y="185" width="12" height="16" rx="6" fill="#5D3A5D" />
      <rect x="274" y="185" width="12" height="16" rx="6" fill="#5D3A5D" />
      <circle cx="256" cy="155" r="6" fill="#5D3A5D" />

      <!-- Two Minimalist Pines -->
      <g fill="#163D28">
        <path d="M190 235 L 205 185 L 220 235 Z" />
        <path d="M292 235 L 307 185 L 322 235 Z" />
      </g>
    </g>

    <!-- Thick Outer Border -->
    <use href="#shield" fill="none" stroke="#5D3A5D" stroke-width="12" />
    <!-- Inner Accent Border -->
    <use href="#shield" fill="none" stroke="#FDF5E6" stroke-width="4" />
  </g>
</svg>
