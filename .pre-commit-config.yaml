# ═══════════════════════════════════════════════════════════════════════════
# Garamatic Meta-Repo — Pre-Commit Hooks
# ═══════════════════════════════════════════════════════════════════════════
# Runs fast unit tests and linting before each commit.
# Heavy integration tests (docker-based) stay in CI (see .github/workflows/).
#
# Install:
#   uv tool install pre-commit
#   pre-commit install
#
# Run manually on all files:
#   pre-commit run --all-files
# ═══════════════════════════════════════════════════════════════════════════

repos:
  # ─── Standard housekeeping ───────────────────────────────────────────────
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v5.0.0
    hooks:
      - id: trailing-whitespace
      - id: end-of-file-fixer
      - id: check-yaml
      - id: check-json
        exclude: ^portal/tsconfig\.(app|node)\.json$
      - id: check-added-large-files
      - id: check-merge-conflict

  # ─── Submodule tests ─────────────────────────────────────────────────────
  # Submodules (agentic-service, integration-contracts, masala-web) are
  # separate git repos. The pre-commit framework can't see their files from
  # the root repo, so we run a script that checks git diff --cached and
  # runs tests only for staged submodules.
  - repo: local
    hooks:
      - id: submodule-tests
        name: Run tests for staged submodules
        entry: bash scripts/pre-commit-submodule-tests.sh
        language: system
        always_run: true
        pass_filenames: false
