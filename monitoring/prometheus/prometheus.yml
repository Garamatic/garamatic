global:
  scrape_interval: 15s
  evaluation_interval: 15s

scrape_configs:
  - job_name: 'prometheus'
    static_configs:
      - targets: ['localhost:9090']

  - job_name: 'cadvisor'
    static_configs:
      - targets: ['cadvisor:8080']

  - job_name: 'ticket-masala'
    static_configs:
      - targets: ['ticket-masala:8080']
    metrics_path: '/metrics'

  - job_name: 'gatekeeper-api'
    static_configs:
      - targets: ['gatekeeper-api:8080']
    metrics_path: '/metrics'

  - job_name: 'mailing-service'
    static_configs:
      - targets: ['mailing-service:8080']
    metrics_path: '/metrics'

  - job_name: 'agentic-service'
    static_configs:
      - targets: ['agentic-service:3001']
    metrics_path: '/metrics'

  - job_name: 'odoo-integration'
    static_configs:
      - targets: ['odoo-integration:8080']
    metrics_path: '/metrics'

  - job_name: 'rabbitmq'
    static_configs:
      - targets: ['rabbitmq:15692']
    metrics_path: '/metrics'
