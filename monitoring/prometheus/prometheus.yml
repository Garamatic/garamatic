# ═══════════════════════════════════════════════════════════════════════════
# Prometheus Configuration for Garamatic
# ═══════════════════════════════════════════════════════════════════════════

global:
  scrape_interval: 15s
  evaluation_interval: 15s
  external_labels:
    cluster: garamatic
    replica: '{{.ExternalURL}}'

alerting:
  alertmanagers:
    - static_configs:
        - targets:
            - alertmanager:9093

rule_files:
  - /etc/prometheus/rules/*.yml

scrape_configs:
  # ─── Prometheus Self ─────────────────────────────────────────────────────
  - job_name: 'prometheus'
    static_configs:
      - targets: ['localhost:9090']

  # ─── Docker Containers (cAdvisor) ───────────────────────────────────────
  - job_name: 'cadvisor'
    static_configs:
      - targets: ['cadvisor:8080']
    metric_relabel_configs:
      - source_labels: [__name__]
        regex: 'container_cpu_usage_seconds_total'
        target_label: metric_type
        replacement: cpu

  # ─── Host Metrics (node-exporter) ─────────────────────────────────────
  - job_name: 'node-exporter'
    static_configs:
      - targets: ['node-exporter:9100']

  # ─── RabbitMQ ───────────────────────────────────────────────────────────
  - job_name: 'rabbitmq'
    static_configs:
      - targets: ['garamatic_rabbitmq:15692']
    metrics_path: '/metrics'

  # ─── Garamatic Services ─────────────────────────────────────────────────
  - job_name: 'ticket-masala'
    static_configs:
      - targets: ['garamatic_ticket_masala:8080']
    metrics_path: '/metrics'

  - job_name: 'gatekeeper-api'
    static_configs:
      - targets: ['garamatic_gatekeeper:8080']
    metrics_path: '/metrics'

  - job_name: 'mailing-service'
    static_configs:
      - targets: ['garamatic_mailing:8080']
    metrics_path: '/metrics'

  - job_name: 'agentic-service'
    static_configs:
      - targets: ['garamatic_agentic:3001']
    metrics_path: '/metrics'

  - job_name: 'odoo-integration'
    static_configs:
      - targets: ['garamatic_odoo_bridge:8080']
    metrics_path: '/metrics'

  - job_name: 'event-planner'
    static_configs:
      - targets: ['garamatic_event_planner:80']
    metrics_path: '/metrics'

  - job_name: 'garamatic-web'
    static_configs:
      - targets: ['garamatic_web:8080']
    metrics_path: '/metrics'

  - job_name: 'masala-web'
    static_configs:
      - targets: ['garamatic_masala_web:8080']
    metrics_path: '/metrics'
