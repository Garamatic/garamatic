# ═══════════════════════════════════════════════════════════════════════════
# Grafana Dashboards — Provisioning
# ═══════════════════════════════════════════════════════════════════════════

apiVersion: 1

providers:
  - name: 'Garamatic'
    orgId: 1
    folder: 'Garamatic'
    folderUid: ''
    type: file
    disableDeletion: false
    editable: true
    updateIntervalSeconds: 10
    allowUiUpdates: true
    options:
      path: /etc/grafana/provisioning/dashboards
