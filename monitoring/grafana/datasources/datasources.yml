# ═══════════════════════════════════════════════════════════════════════════
# Grafana Datasources — Provisioning
# ═══════════════════════════════════════════════════════════════════════════
# Minimal: JSON API datasource for health checks (no Prometheus needed).
# ═══════════════════════════════════════════════════════════════════════════

apiVersion: 1

datasources:
  - name: JSON API
    type: marcusolsson-json-datasource
    access: proxy
    url: http://health-dashboard:80
    isDefault: true
    editable: false
