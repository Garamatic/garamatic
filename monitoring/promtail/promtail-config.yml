# ═══════════════════════════════════════════════════════════════════════════
# Promtail Configuration — Log Shipper
# ═══════════════════════════════════════════════════════════════════════════

server:
  http_listen_port: 9080
  grpc_listen_port: 0

positions:
  filename: /tmp/positions.yaml

clients:
  - url: http://loki:3100/loki/api/v1/push

scrape_configs:
  # ─── Docker Container Logs ───────────────────────────────────────────────
  - job_name: docker
    static_configs:
      - targets:
          - localhost
        labels:
          job: docker
          __path__: /var/lib/docker/containers/*/*.log
    pipeline_stages:
      - json:
          expressions:
            output: log
            stream: stream
            attrs:
      - json:
          source: attrs
          expressions:
            tag: tag
            container_name: container_name
            compose_service: compose_service
            image: image
      - labels:
          tag:
          container_name:
          compose_service:
          image:
      - output:
          source: output

  # ─── Garamatic Services (by container name) ────────────────────────────
  - job_name: garamatic-services
    static_configs:
      - targets:
          - localhost
        labels:
          job: garamatic
          __path__: /var/lib/docker/containers/*/*.log
    pipeline_stages:
      - json:
          expressions:
            log: log
      - json:
          source: log
          expressions:
            level: level
            message: message
            service: service
      - labels:
          level:
          service:
      - output:
          source: message
