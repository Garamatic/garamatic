# ═══════════════════════════════════════════════════════════════════════════
# Alertmanager Configuration — Alert Routing
# ═══════════════════════════════════════════════════════════════════════════

global:
  smtp_smarthost: 'localhost:587'
  smtp_from: 'alerts@garamatic.io'
  smtp_auth_username: ''
  smtp_auth_password: ''
  resolve_timeout: 5m

route:
  group_by: ['alertname', 'severity', 'service']
  group_wait: 30s
  group_interval: 5m
  repeat_interval: 12h
  receiver: 'default'
  routes:
    - match:
        severity: critical
      receiver: 'critical'
      group_wait: 10s
      repeat_interval: 5m
    - match:
        severity: warning
      receiver: 'warning'
      repeat_interval: 30m

inhibit_rules:
  - source_match:
      severity: 'critical'
    target_match:
      severity: 'warning'
    equal: ['alertname', 'service']

receivers:
  - name: 'default'
    slack_configs:
      - send_resolved: true
        title: 'Garamatic Alert'
        text: '{{ range .Alerts }}{{ .Annotations.summary }}{{ end }}'
        api_url: '${SLACK_WEBHOOK_URL}'

  - name: 'critical'
    slack_configs:
      - send_resolved: true
        title: '🔴 CRITICAL: Garamatic Alert'
        text: '{{ range .Alerts }}{{ .Annotations.summary }}\n{{ .Annotations.description }}{{ end }}'
        api_url: '${SLACK_WEBHOOK_URL}'
    email_configs:
      - to: 'ops-team@garamatic.io'
        send_resolved: true
        headers:
          Subject: '[CRITICAL] Garamatic Alert'
        html: |
          <h2>{{ .GroupLabels.alertname }}</h2>
          <p>{{ range .Alerts }}{{ .Annotations.summary }}<br>{{ .Annotations.description }}<br><br>{{ end }}</p>

  - name: 'warning'
    slack_configs:
      - send_resolved: true
        title: '⚠️ WARNING: Garamatic Alert'
        text: '{{ range .Alerts }}{{ .Annotations.summary }}{{ end }}'
        api_url: '${SLACK_WEBHOOK_URL}'
